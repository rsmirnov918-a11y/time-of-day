<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Планировщик дня и недели</title>
<style>
/* ===================== ТЕМА / ПЕРЕМЕННЫЕ ===================== */
:root{
  --surface:#ffffff; --surface2:#eef1f6; --panel:#ffffff;
  --text:#1b2330; --muted:#6b7585; --line:#e2e7ee;
  --grid:#eef1f5; --grid2:#d7dde6;
  --now:#e0485a; --accent:#2f80ed;
  --shadow:0 8px 26px rgba(20,30,50,.14);
}
[data-theme="dark"]{
  --surface:#161b24; --surface2:#0c0f15; --panel:#1b212d;
  --text:#e7ebf2; --muted:#98a2b3; --line:#283040;
  --grid:#1a212c; --grid2:#2b3343;
  --now:#ff6b7a; --accent:#5b9dff;
  --shadow:0 10px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--surface2); color:var(--text);
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
body.dragging-active{ user-select:none; -webkit-user-select:none; cursor:grabbing; }

button,input,textarea{font:inherit;color:inherit}
button{cursor:pointer}

/* ===================== ШАПКА ===================== */
header{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line);
}
.brand{font-weight:700; font-size:16px; margin-right:auto; white-space:nowrap}
.tools{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.tools .start{display:flex; align-items:center; gap:4px; font-size:13px; color:var(--muted)}
.tools input[type=time]{
  background:var(--surface); border:1px solid var(--line); color:var(--text);
  border-radius:8px; padding:4px 6px;
}
.tools button{
  background:var(--surface); border:1px solid var(--line); color:var(--text);
  border-radius:8px; padding:6px 10px; font-size:13px;
}
.tools button:hover{border-color:var(--accent)}
.tools button.primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600}
.tools button.icon{ font-size:16px; line-height:1; padding:6px 9px; }
.tools button:disabled{ opacity:.35; cursor:default; }
.tools button:disabled:hover{ border-color:var(--line); }

/* блок аутентификации */
.auth{ display:flex; align-items:center; gap:8px; }
.auth .avatar{ width:26px; height:26px; border-radius:50%; object-fit:cover; border:1px solid var(--line); }
.auth .uemail{ font-size:12px; color:var(--muted); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth button{ background:var(--surface); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 10px; font-size:13px; }
.auth button.primary{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

/* ===================== ВКЛАДКИ ДНЕЙ ===================== */
.tabs{
  display:flex; gap:4px; padding:8px 12px; background:var(--panel);
  border-bottom:1px solid var(--line); overflow-x:auto;
}
.tab{
  flex:1 0 auto; min-width:44px; text-align:center;
  background:var(--surface); border:1px solid var(--line); color:var(--muted);
  border-radius:9px; padding:7px 6px; font-size:13px; font-weight:600;
}
.tab.today{ box-shadow:inset 0 -2px 0 var(--now); }
.tab.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

/* ===================== СВОДКА ===================== */
.summary{ padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
.s-line{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.s-range{ font-weight:700; font-variant-numeric:tabular-nums; margin-right:4px; }
.s-chip{
  font-size:12px; padding:2px 8px; border-radius:999px; white-space:nowrap;
  background:color-mix(in srgb, var(--cat) 16%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 45%, var(--surface));
  color:color-mix(in srgb, var(--cat) 75%, var(--text));
}
.s-week{ margin-top:6px; font-size:12px; color:var(--muted); }

/* ===================== ТАЙМЛАЙН ===================== */
.timeline-scroll{
  flex:1; overflow-y:auto; overflow-x:hidden;
  touch-action:pan-y; padding:10px 10px 60px;
}
.timeline{
  position:relative; max-width:680px; margin:0 auto;
  background-image:linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size:100% 60px;
}
.block{
  position:absolute; left:46px; right:2px; box-sizing:border-box;
  border-radius:9px; padding:3px 8px 3px 26px; overflow:hidden;
  transition:top .18s cubic-bezier(.2,.7,.3,1);
  background:color-mix(in srgb, var(--cat) 16%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 48%, var(--surface));
  color:color-mix(in srgb, var(--cat) 78%, var(--text));
  touch-action:pan-y; user-select:none; -webkit-user-select:none;
}
.timeline.resizing .block{ transition:none; }
.block.dragging{
  transition:none; z-index:30; cursor:grabbing; opacity:.98;
  box-shadow:var(--shadow); transform:scale(1.015);
  border-color:color-mix(in srgb, var(--cat) 70%, var(--surface));
}
.cat-free{ border-style:dashed; }
.block[data-pinned="1"] .b-time::before{ content:"📌 "; }

.grip{
  position:absolute; left:0; top:0; bottom:0; width:22px;
  display:flex; align-items:center; justify-content:center;
  color:color-mix(in srgb, var(--cat) 60%, var(--text)); opacity:.65;
  cursor:grab; touch-action:none; font-size:13px; letter-spacing:-2px;
}
.grip:active{cursor:grabbing}
.resize-handle{
  position:absolute; left:0; right:0; bottom:0; height:13px;
  cursor:ns-resize; touch-action:none;
}
.resize-handle::after{
  content:""; position:absolute; left:50%; bottom:3px; transform:translateX(-50%);
  width:36px; height:3px; border-radius:3px;
  background:color-mix(in srgb, var(--cat) 55%, var(--surface)); opacity:.55;
}
.b-top{ display:flex; gap:6px; align-items:baseline; line-height:1.15; }
.b-time{ font-variant-numeric:tabular-nums; font-weight:700; font-size:12px; opacity:.85; }
.b-name{ font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.b-meta{ display:flex; gap:8px; font-size:11px; opacity:.78; margin-top:1px; }
/* короткие блоки: убираем ресайз-полосу (она перекрывала весь блок) и второй ряд,
   чтобы тап открывал редактор — длительность меняется степперами ±5/±15 */
.block.short{ padding-top:1px; padding-bottom:1px; }
.block.short .resize-handle{ display:none; }
.block.short .b-meta{ display:none; }
.block.short .b-top{ font-size:11px; }

/* пустые промежутки на треке = свободное время; тап = добавить задачу */
.slot{
  position:absolute; left:46px; right:2px; box-sizing:border-box;
  border:1px dashed var(--grid2); border-radius:9px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--muted); overflow:hidden;
}
.slot:hover{ background:color-mix(in srgb, var(--accent) 8%, transparent); border-color:var(--accent); }
.slot span{ opacity:.7; }
.timeline.resizing .slot{ display:none; }
/* часовые метки слева */
.hour{
  position:absolute; left:0; width:40px; text-align:right;
  margin-top:-7px; font-size:10px; color:var(--muted);
  font-variant-numeric:tabular-nums; pointer-events:none;
}
.now-line{
  position:absolute; left:0; right:0; height:0; z-index:20;
  border-top:2px solid var(--now); pointer-events:none;
}
.now-line span{
  position:absolute; left:2px; top:-9px; background:var(--now); color:#fff;
  font-size:10px; font-weight:700; padding:0 5px; border-radius:7px;
}

/* ===================== МОДАЛКИ ===================== */
.overlay{
  position:fixed; inset:0; background:rgba(10,15,25,.45);
  display:flex; align-items:flex-end; justify-content:center; z-index:100;
}
.overlay[hidden]{display:none}
.sheet{
  width:100%; max-width:480px; background:var(--panel); color:var(--text);
  border-radius:16px 16px 0 0; padding:16px; box-shadow:var(--shadow);
  max-height:88vh; overflow:auto;
}
@media(min-width:560px){
  .overlay{align-items:center}
  .sheet{border-radius:16px}
}
.sheet-head{ display:flex; align-items:center; margin-bottom:12px; }
.sheet-head h3{ margin:0; font-size:17px; }
.sheet-head .x{ margin-left:auto; background:none; border:none; font-size:18px; color:var(--muted); }
.fld{ display:block; margin-bottom:14px; }
.fld>span{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
.fld.row{ display:flex; align-items:center; justify-content:space-between; }
.fld.row>span{ margin:0; }
.sheet input[type=text], .sheet input[type=time], .sheet textarea{
  width:100%; background:var(--surface); border:1px solid var(--line);
  color:var(--text); border-radius:9px; padding:9px 10px;
}
.sheet textarea{ resize:vertical; font-family:ui-monospace,Consolas,monospace; font-size:12px; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{
  padding:6px 11px; border-radius:999px; font-size:13px;
  background:color-mix(in srgb, var(--cat) 14%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 40%, var(--surface));
  color:color-mix(in srgb, var(--cat) 78%, var(--text));
}
.chip.on{ background:color-mix(in srgb, var(--cat) 70%, var(--surface)); color:#fff; font-weight:700;
  border-color:color-mix(in srgb, var(--cat) 80%, var(--surface)); }
/* чипы выбора дней в редакторе */
.daychips .daychip{ --cat:var(--accent); padding:6px 10px; min-width:38px; }
.daychips .daychip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
.daychips .daychip.cur{ box-shadow:0 0 0 2px var(--accent) inset; font-weight:700; }
.stepper{ display:flex; align-items:center; gap:8px; }
.stepper button{
  width:46px; height:38px; border-radius:9px; font-weight:700;
  background:var(--surface); border:1px solid var(--line); color:var(--text);
}
.stepper b{ min-width:80px; text-align:center; font-size:16px; font-variant-numeric:tabular-nums; }
.sheet-actions{ display:flex; gap:8px; margin-top:6px; }
.sheet-actions button{ flex:1; padding:11px; border-radius:10px; border:1px solid var(--line);
  background:var(--surface); color:var(--text); font-weight:600; }
.sheet-actions .primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
.sheet-actions .danger{ background:transparent; border-color:#e0485a; color:#e0485a; }
.copy-days{ display:flex; flex-wrap:wrap; gap:8px; }
.copy-days button{ flex:1 0 60px; padding:12px; border-radius:10px;
  background:var(--surface); border:1px solid var(--line); color:var(--text); font-weight:600; }
.im-err{ color:#e0485a; font-size:12px; min-height:16px; margin:-6px 0 10px; }

/* ===================== ТОСТ ===================== */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
  background:var(--text); color:var(--surface); padding:9px 16px; border-radius:999px;
  font-size:13px; font-weight:600; opacity:0; transition:.2s; z-index:200; pointer-events:none;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">🗓️ Планировщик</div>
  <div class="tools">
    <button id="undoBtn" class="icon" title="Отменить (Ctrl+Z)" disabled>↶</button>
    <button id="redoBtn" class="icon" title="Вернуть (Ctrl+Y)" disabled>↷</button>
    <label class="start">Старт <input type="time" id="dayStart" step="300"></label>
    <label class="start">до <input type="time" id="dayEnd" step="300"></label>
    <button id="addBtn" class="primary">+ Задача</button>
    <button id="copyBtn">Копировать</button>
    <button id="exportBtn">Экспорт</button>
    <button id="importBtn">Импорт</button>
    <button id="resetBtn">Сброс</button>
    <button id="themeBtn" title="Тема">🌙</button>
  </div>
  <div class="auth" id="authArea"></div>
</header>

<nav class="tabs" id="tabs"></nav>
<div class="summary" id="summary"></div>

<div class="timeline-scroll" id="scrollEl">
  <div class="timeline" id="timeline">
    <div class="now-line" id="nowLine" style="display:none"><span>сейчас</span></div>
  </div>
</div>

<!-- Редактор задачи -->
<div class="overlay" id="editorOverlay" hidden>
  <div class="sheet">
    <div class="sheet-head"><h3>Задача</h3><button class="x" id="edClose">✕</button></div>
    <label class="fld"><span>Название</span><input id="edName" type="text"></label>
    <div class="fld"><span>Категория</span><div class="chips" id="edChips"></div></div>
    <div class="fld"><span>Длительность</span>
      <div class="stepper">
        <button data-d="-15">−15</button>
        <button data-d="-5">−5</button>
        <b id="edDur">60м</b>
        <button data-d="5">+5</button>
        <button data-d="15">+15</button>
      </div>
    </div>
    <label class="fld"><span>Начало</span><input id="edStart" type="time" step="300"></label>
    <div class="fld"><span>На каких днях</span><div class="chips daychips" id="edDays"></div></div>
    <div class="sheet-actions">
      <button class="danger" id="edDelete">Удалить</button>
      <button class="danger" id="edDeleteAll">Со всех дней</button>
      <button class="primary" id="edDone">Готово</button>
    </div>
  </div>
</div>

<!-- Импорт -->
<div class="overlay" id="importOverlay" hidden>
  <div class="sheet">
    <div class="sheet-head"><h3>Импорт JSON</h3><button class="x" id="imClose">✕</button></div>
    <label class="fld"><span>Вставьте JSON и нажмите «Загрузить»</span>
      <textarea id="imText" rows="9" placeholder='{"days":{...}}'></textarea></label>
    <div class="im-err" id="imErr"></div>
    <div class="sheet-actions"><button class="primary" id="imLoad">Загрузить</button></div>
  </div>
</div>

<!-- Копирование дня -->
<div class="overlay" id="copyOverlay" hidden>
  <div class="sheet">
    <div class="sheet-head"><h3>Копировать день в…</h3><button class="x" id="cpClose">✕</button></div>
    <div class="copy-days" id="copyDays"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
"use strict";

/* ===================== FIREBASE SDK ===================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4QIhibsN8RvY9-jAjiHFG0Bx1wi6Rgho",
  authDomain: "time-of-day-468f1.firebaseapp.com",
  projectId: "time-of-day-468f1",
  storageBucket: "time-of-day-468f1.firebasestorage.app",
  messagingSenderId: "1007960684482",
  appId: "1:1007960684482:web:a9766ddb8b8e117f38885b"
};

/* ===================== КОНСТАНТЫ ===================== */
const DAYS = [["mon","Пн"],["tue","Вт"],["wed","Ср"],["thu","Чт"],["fri","Пт"],["sat","Сб"],["sun","Вс"]];
const CATS = {
  poker:    {label:"Покер",      color:"#e0485a"},
  theory:   {label:"Теория",     color:"#7c5cff"},
  projects: {label:"Проекты",    color:"#2f80ed"},
  english:  {label:"Английский", color:"#12a594"},
  training: {label:"Спорт",      color:"#f5871f"},
  meal:     {label:"Еда",        color:"#5fa83a"},
  routine:  {label:"Рутина",     color:"#8a93a6"},
  brk:      {label:"Перерыв",    color:"#e0a400"},
  free:     {label:"Свободное",  color:"#9aa3b2"},
};
const TODAY_KEY = ["sun","mon","tue","wed","thu","fri","sat"][new Date().getDay()];

/* Минимальная база на «время-треке» 07:00–23:00. Остальное добавляется по надобности.
   Формат: [название, категория, "ЧЧ:ММ", длительность, gid].
   gid = групповой id (один и тот же блок на разных днях), для «удалить со всех дней».
   Пн/Ср/Пт вечером — «Теория покера», остальные дни — «Проекты · задачи». */
const _work = (k) => (k==="mon"||k==="wed"||k==="fri")
  ? ["Теория покера","theory","19:00",120,"g_theory"]
  : ["Проекты · задачи","projects","19:00",120,"g_projects"];
const _baseDay = (k) => [
  ["Тренировка","training","09:00",60,"g_train"],     // 09:00 → 10:00
  ["Покер-сессия","poker","11:00",360,"g_session"],   // 11:00 → 17:00
  _work(k),                                            // 19:00 → 21:00
  ["Английский","english","21:00",30,"g_eng"],         // 21:00 → 21:30
];
const SEED = {
  mon:_baseDay("mon"), tue:_baseDay("tue"), wed:_baseDay("wed"), thu:_baseDay("thu"),
  fri:_baseDay("fri"), sat:_baseDay("sat"), sun:_baseDay("sun"),
};

/* ===================== УТИЛИТЫ ===================== */
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const deepClone = o => JSON.parse(JSON.stringify(o));
const roundTo5 = m => Math.round(m/5)*5;
let _uid = 0;
function uid(){ _uid++; return "t"+Date.now().toString(36)+"_"+_uid.toString(36); }
function parseTime(s){ const m=/^(\d{1,2}):(\d{2})$/.exec(String(s||"")); if(!m) return 420; return (+m[1])*60+(+m[2]); }
function fmtTime(min){ min=Math.round(min); min=((min%1440)+1440)%1440; const h=Math.floor(min/60), m=min%60; return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); }
function fmtDur(min){ const h=Math.floor(min/60), m=min%60; if(h&&m) return h+"ч "+m+"м"; if(h) return h+"ч"; return m+"м"; }

/* ===================== ХРАНИЛИЩЕ (изолированный модуль) =====================
   load/save вынесены сюда, чтобы позже заменить localStorage на Firebase Firestore,
   не трогая остальную логику. */
const Storage = (() => {
  const KEY = "dayPlanner.v1";
  return {
    load(){ try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } },
    save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} },
  };
})();
let _saveTimer=null;
function saveSoon(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>Storage.save(state),250); // оффлайн-кэш
  Cloud.pushSoon();                                   // облако (если вошёл)
  History.record();                                   // шаг истории (undo/redo)
}

/* ===================== ОБЛАКО (Firebase Firestore + Auth) =====================
   Тот же контракт, что у Storage: грузим/пишем ВЕСЬ объект state.
   - не вошёл  -> ничего не делаем, работает только localStorage;
   - вошёл     -> подписка onSnapshot (живой синк) + setDoc с debounce;
   - защита от эха: не пишем обратно изменение, прилетевшее из onSnapshot. */
const Cloud = (() => {
  let auth=null, db=null, user=null, unsub=null, ready=false;
  let timer=null, applyingRemote=false, lastSyncedJSON=null;
  // канонический отпечаток состояния: фиксированный порядок ключей,
  // чтобы эхо из Firestore (другой порядок ключей) распознавалось как «своё»
  const canon = s => { try{ return JSON.stringify(validateState(s)); }catch(e){ return JSON.stringify(s); } };

  function init(){
    try{
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      ready = true;
    }catch(e){ ready=false; renderAuthUI(); return; }
    // оффлайн-персистентность (молча, если не поддерживается)
    try{ enableIndexedDbPersistence(db).catch(()=>{}); }catch(e){}
    onAuthStateChanged(auth, onAuth);
    renderAuthUI();
  }

  function onAuth(u){
    user = u || null;
    renderAuthUI();
    if(unsub){ unsub(); unsub=null; }
    lastSyncedJSON = null;
    if(!user) return; // вышел -> снова чисто локальный режим
    const ref = doc(db, "schedules", user.uid);
    unsub = onSnapshot(ref, { includeMetadataChanges:true },
      (snap) => {
        if(!snap.exists()){
          // пока ответ только из кэша — НЕ затираем возможные данные в облаке (важно для второго устройства)
          if(snap.metadata && snap.metadata.fromCache) return;
          // сервер подтвердил, что документа нет -> первичная миграция локальных данных
          pushNow();
          return;
        }
        const data = snap.data();
        if(!data || !data.state) return;
        const incoming = canon(data.state);
        if(incoming === lastSyncedJSON) return;            // наш же эхо-снимок
        if(incoming === canon(state)){ lastSyncedJSON = incoming; return; } // те же данные, что уже есть
        lastSyncedJSON = incoming;
        applyRemote(data.state);                            // настоящее изменение из облака
      },
      (err) => { toast("⚠ нет синхронизации"); }
    );
  }

  function applyRemote(remoteState){
    let norm;
    try{ norm = validateState(remoteState); }catch(e){ return; }
    applyingRemote = true;
    state = norm;
    Storage.save(state);                            // обновляем оффлайн-кэш
    if(!state.days[currentDay]) currentDay = "mon";
    renderAll();
    History.reset();                                // прилетело из облака — историю обнуляем
    applyingRemote = false;
  }

  function pushSoon(){
    if(!ready || !user || applyingRemote) return;
    if(timer) clearTimeout(timer);
    timer = setTimeout(pushNow, 600);
  }

  async function pushNow(){
    if(!ready || !user) return;
    try{
      lastSyncedJSON = canon(state);                 // канон. отпечаток нашей записи (для отсечки эха)
      await setDoc(doc(db,"schedules",user.uid),
                   { state, updatedAt: serverTimestamp() }, { merge:true });
    }catch(e){ toast("⚠ офлайн / нет синка"); }
  }

  async function login(){
    if(!ready){ toast("Firebase недоступен"); return; }
    try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e){ if(e && e.code!=="auth/popup-closed-by-user") toast("Не удалось войти"); }
  }
  async function logout(){ try{ await signOut(auth); }catch(e){} }

  return { init, login, logout, pushSoon, get user(){ return user; }, get ready(){ return ready; } };
})();

/* ===================== ИСТОРИЯ (undo / redo) =====================
   Снимки всего state. Быстрые правки коалесятся по паузе (один шаг истории).
   record() дёргается на каждое локальное изменение (из saveSoon). */
const History = (() => {
  let undo=[], redo=[], baseline="null", timer=null;
  const MAX=120;
  const snap=()=>JSON.stringify(state);
  function init(){ baseline=snap(); undo=[]; redo=[]; updateButtons(); }
  function reset(){ init(); }                 // после прихода из облака — историю обнуляем
  function record(){                          // изменение: запланировать коммит с коалесингом
    if(timer) clearTimeout(timer);
    timer=setTimeout(commit, 350);
    updateButtons();
  }
  function commit(){
    timer=null;
    const cur=snap();
    if(cur===baseline) return;
    undo.push(baseline); if(undo.length>MAX) undo.shift();
    redo=[]; baseline=cur; updateButtons();
  }
  function flush(){ if(timer){ clearTimeout(timer); timer=null; } commit(); }
  function apply(json){
    state=JSON.parse(json);
    if(!state.days[currentDay]) currentDay="mon";
    baseline=json;
    Storage.save(state); Cloud.pushSoon();    // применённое состояние тоже кэшируем и синкаем
    renderAll(); updateButtons();
  }
  function undoOp(){
    flush();
    if(!undo.length) return;
    redo.push(baseline);
    apply(undo.pop());
    toast("Отменено");
  }
  function redoOp(){
    flush();
    if(!redo.length) return;
    undo.push(baseline);
    apply(redo.pop());
    toast("Возвращено");
  }
  function updateButtons(){
    const ub=document.getElementById("undoBtn"), rb=document.getElementById("redoBtn");
    if(!ub) return;
    const pending = snap()!==baseline;
    ub.disabled = !(undo.length>0 || pending);
    rb.disabled = redo.length===0;
  }
  return { init, reset, record, undo:undoOp, redo:redoOp };
})();

/* ===================== СОСТОЯНИЕ ===================== */
function template(){
  const days={};
  for(const [k] of DAYS){
    days[k]={ start:"07:00", tasks: SEED[k].map(a=>({id:uid(), name:a[0], cat:a[1], start:parseTime(a[2]), dur:a[3], gid:a[4]})) };
  }
  return { version:1, settings:{theme:"light", dayEnd:"23:00"}, days };
}
function normTask(t){
  return {
    id: t && t.id ? String(t.id) : uid(),
    name: String((t&&t.name) ?? "Задача"),
    cat: (t && CATS[t.cat]) ? t.cat : "free",
    dur: clamp(roundTo5(+( (t&&t.dur) || 60)), 10, 24*60),
    // время старта; у старых данных поля нет -> проставим последовательно ниже
    start: (t && t.start!=null && isFinite(t.start)) ? clamp(roundTo5(+t.start),0,24*60) : null,
    gid: (t && t.gid) ? String(t.gid) : uid(),   // группа «один блок на разных днях»
  };
}
function validateState(obj){
  if(!obj || typeof obj!=="object") throw new Error("не объект");
  if(!obj.days || typeof obj.days!=="object") throw new Error("нет поля days");
  const _s=obj.settings||{};
  const out={ version:1, settings:{
    theme:(_s.theme==="dark")?"dark":"light",
    dayEnd:/^\d{1,2}:\d{2}$/.test(_s.dayEnd)?_s.dayEnd:"23:00"
  }, days:{} };
  for(const [k] of DAYS){
    const d=obj.days[k];
    if(!d || !Array.isArray(d.tasks)) throw new Error("день "+k+" повреждён");
    out.days[k]={ start:/^\d{1,2}:\d{2}$/.test(d.start)?d.start:"07:00", tasks:d.tasks.map(normTask) };
    // миграция старых данных (без поля start) -> расставляем встык от старта дня
    let cur=parseTime(out.days[k].start);
    for(const t of out.days[k].tasks){ if(t.start==null) t.start=cur; cur=t.start+t.dur; }
    out.days[k].tasks.sort((a,b)=>a.start-b.start);
  }
  return out;
}

let state, currentDay, editingId=null;

const curDay     = () => state.days[currentDay];
const curTasks   = () => curDay().tasks;
const winStartMin= () => parseTime(curDay().start);                              // верх трека-окна
const winEndMin  = () => parseTime((state.settings && state.settings.dayEnd) || "23:00"); // низ окна
const BLOCK_GAP=6, BLOCK_VIS_MIN=8;                                  // косметический зазор между блоками
const visH = h => Math.max(h - BLOCK_GAP, BLOCK_VIS_MIN);           // видимая высота (не влияет на время)
const clampStart = s => clamp(roundTo5(s), winStartMin(), 24*60);  // время старта не раньше начала окна

/* ===================== ВРЕМЯ-ТРЕК =====================
   У каждой задачи СВОЁ время старта (task.start, минуты от полуночи).
   Свободное время между задачами — просто пустые промежутки на треке.
   Наложений нет: при раскладке блоки каскадно раздвигаются вниз. */
function computeLayout(tasks, vs){
  const sorted=[...tasks].sort((a,b)=>a.start-b.start);
  let cursor=-1e9; const items=[];
  for(const t of sorted){
    const s=Math.max(t.start, cursor);     // не раньше конца предыдущего -> без наложений
    items.push({ task:t, top:s-vs, height:t.dur, startMin:s });
    cursor=s+t.dur;
  }
  const endMin = items.length ? items[items.length-1].startMin+items[items.length-1].height : vs;
  return { items, endMin };
}
function viewStart(){ let m=winStartMin(); for(const t of curTasks()) if(t.start<m) m=t.start; return m; }
const layoutCurrent = () => computeLayout(curTasks(), viewStart());
function viewEnd(){ return Math.max(winEndMin(), layoutCurrent().endMin); }

/* Раскладка с «якорем»: активный блок (anchor) стоит на своём времени,
   остальные раздвигаются вокруг него (вверх до якоря, вниз после). Возвращает Map task->start. */
function placeAnchored(tasks, anchor){
  const aStart=anchor.start, aEnd=anchor.start+anchor.dur;
  const others=tasks.filter(t=>t!==anchor).sort((a,b)=>a.start-b.start);
  const above=[], below=[];
  for(const t of others){ if(t.start+t.dur<=aStart) above.push(t); else below.push(t); }
  const out=new Map(); out.set(anchor, aStart);
  let top=aStart;                                   // пакуем «верхних» вверх, конец <= aStart
  for(let i=above.length-1;i>=0;i--){ const t=above[i]; const s=Math.min(t.start, top-t.dur); out.set(t,s); top=s; }
  let cur=aEnd;                                      // «нижних» — вниз от конца якоря
  for(const t of below){ const s=Math.max(t.start,cur); out.set(t,s); cur=s+t.dur; }
  return out;
}
/* Привести данные к виду без наложений и пересортировать (после любого изменения). */
function normalize(anchor){
  if(anchor){ const map=placeAnchored(curTasks(), anchor); for(const [t,s] of map) t.start=s; }
  else { const items=computeLayout(curTasks(),0).items; for(const it of items) it.task.start=it.startMin; }
  curDay().tasks=[...curTasks()].sort((a,b)=>a.start-b.start);
}
function normalizeDay(dayKey){   // привести произвольный день (для копий на другие дни)
  const arr=state.days[dayKey].tasks;
  const items=computeLayout(arr,0).items;
  for(const it of items) it.task.start=it.startMin;
  state.days[dayKey].tasks=[...arr].sort((a,b)=>a.start-b.start);
}

function renderAll(){ applyTheme(); renderTabs(); dayStartInput.value=curDay().start; dayEndInput.value=(state.settings.dayEnd)||"22:00"; renderTimeline(); }

/* ===================== DRAG (Pointer Events) =====================
   На телефоне: тащить за «ручку» (⠿) — она с touch-action:none, поэтому
   страница не скроллится во время драга; тело блока скроллит список (pan-y)
   и открывает редактор по тапу. На мыши можно тащить за любую часть блока. */
let press=null, resizing=null;

function onPointerDown(e, task, el){
  if(e.target.closest(".resize-handle")){ startResize(e, task, el); return; }
  if(press||resizing) return;
  const onGrip = !!e.target.closest(".grip");
  const eligible = onGrip || e.pointerType==="mouse";
  press={ task, block:el, pointerId:e.pointerId, startX:e.clientX, startY:e.clientY,
          moved:false, dragging:false, eligible };
  if(eligible){ try{ el.setPointerCapture(e.pointerId); }catch(_){ } }
  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp);
  window.addEventListener("pointercancel", onPointerCancel);
}
function onPointerMove(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(!press.moved && Math.hypot(e.clientX-press.startX, e.clientY-press.startY)>6) press.moved=true;
  if(press.dragging){ e.preventDefault(); dragMoveTo(e.clientY); return; }
  if(press.eligible && press.moved) startDrag(e);
}
function onPointerUp(e){
  if(!press || e.pointerId!==press.pointerId) return;
  const wasTap = !press.dragging && !press.moved;
  const tapId = press.task.id;
  if(press.dragging) commitDrag();
  cleanupPress();
  if(wasTap) openEditor(tapId);
}
function onPointerCancel(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(press.dragging){
    stopAutoScroll();
    if(press.origStart!=null) press.task.start=press.origStart; // откат времени
    press.block.classList.remove("dragging");
    document.body.classList.remove("dragging-active");
    renderTimeline();
  }
  cleanupPress();
}
function cleanupPress(){
  window.removeEventListener("pointermove", onPointerMove);
  window.removeEventListener("pointerup", onPointerUp);
  window.removeEventListener("pointercancel", onPointerCancel);
  if(press){ try{ press.block.releasePointerCapture(press.pointerId); }catch(_){ } }
  press=null;
}
function startDrag(e){
  press.dragging=true;
  try{ press.block.setPointerCapture(e.pointerId); }catch(_){ }
  press.vs=viewStart();
  press.origStart=press.task.start;
  press.map={}; timelineEl.querySelectorAll(".block").forEach(b=>press.map[b.dataset.id]=b);
  press.grabOffset = e.clientY - press.block.getBoundingClientRect().top;
  press.block.classList.add("dragging");
  document.body.classList.add("dragging-active");
  startAutoScroll();
  dragMoveTo(e.clientY);
}
function dragMoveTo(clientY){
  press.lastY=clientY;
  const trect=timelineEl.getBoundingClientRect();
  const vs=press.vs;
  const topPx=(clientY-trect.top)-press.grabOffset;
  const start=clampStart(vs+topPx);            // время старта по позиции пальца (кратно 5)
  press.task.start=start;                       // временно двигаем якорь
  const map=placeAnchored(curTasks(), press.task);
  for(const [t,s] of map){
    const el=press.map[t.id]; if(!el) continue;
    el.style.top=(s-vs)+"px";
    el.querySelector(".b-time").textContent=fmtTime(s);
  }
}
function commitDrag(){
  stopAutoScroll();
  normalize(press.task);                         // зафиксировать и убрать наложения
  press.block.classList.remove("dragging");
  document.body.classList.remove("dragging-active");
  saveSoon();
  renderTimeline();
}
/* авто-скролл у краёв */
function startAutoScroll(){ if(!press.raf) press.raf=requestAnimationFrame(autoTick); }
function stopAutoScroll(){ if(press&&press.raf){ cancelAnimationFrame(press.raf); press.raf=null; } }
function autoTick(){
  if(!press||!press.dragging){ return; }
  const r=scrollEl.getBoundingClientRect(), y=press.lastY, EDGE=56; let v=0;
  if(y<r.top+EDGE) v=-Math.ceil((r.top+EDGE-y)/4);
  else if(y>r.bottom-EDGE) v=Math.ceil((y-(r.bottom-EDGE))/4);
  if(v){ const b=scrollEl.scrollTop; scrollEl.scrollTop+=v; if(scrollEl.scrollTop!==b) dragMoveTo(press.lastY); }
  press.raf=requestAnimationFrame(autoTick);
}

/* ===================== РЕСАЙЗ (нижний край) ===================== */
function startResize(e, task, el){
  if(press||resizing) return;
  e.preventDefault();
  resizing={ task, el, pointerId:e.pointerId };
  try{ el.setPointerCapture(e.pointerId); }catch(_){ }
  timelineEl.classList.add("resizing");
  document.body.classList.add("dragging-active");
  window.addEventListener("pointermove", onResizeMove);
  window.addEventListener("pointerup", onResizeUp);
  window.addEventListener("pointercancel", onResizeUp);
}
function onResizeMove(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  e.preventDefault();
  const top=resizing.el.getBoundingClientRect().top;
  const dur=clamp(roundTo5(e.clientY-top), 10, 24*60);
  if(dur===resizing.task.dur) return;
  resizing.task.dur=dur;
  const vs=viewStart();
  const map=placeAnchored(curTasks(), resizing.task); // тянем низ -> нижние блоки раздвигаются
  let ve=winEndMin(); for(const [t,s] of map) ve=Math.max(ve, s+t.dur);
  timelineEl.style.height=Math.max(ve-vs, 120)+"px";
  for(const [t,s] of map){
    const b=timelineEl.querySelector('.block[data-id="'+t.id+'"]');
    if(!b) continue;
    b.style.top=(s-vs)+"px"; b.style.height=visH(t.dur)+"px";
    b.querySelector(".b-time").textContent=fmtTime(s);
    if(t===resizing.task) b.querySelector(".b-dur").textContent=fmtDur(t.dur);
  }
  renderSummary();
}
function onResizeUp(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  timelineEl.classList.remove("resizing");
  document.body.classList.remove("dragging-active");
  window.removeEventListener("pointermove", onResizeMove);
  window.removeEventListener("pointerup", onResizeUp);
  window.removeEventListener("pointercancel", onResizeUp);
  try{ resizing.el.releasePointerCapture(resizing.pointerId); }catch(_){ }
  normalize(resizing.task);
  resizing=null;
  saveSoon();
  renderTimeline();
}

  edDays.appendChild(mk("Все дни", false, false, ()=>{
    for(const [k] of DAYS){ if(k===currentDay) continue;
      if(!state.days[k].tasks.some(t=>t.gid===task.gid)){ state.days[k].tasks.push({...task, id:uid()}); normalizeDay(k); } }
    buildDayChips(task); renderTimeline(); saveSoon();
  }));
  for(const [k,l] of DAYS){
    const has=state.days[k].tasks.some(t=>t.gid===task.gid);
    edDays.appendChild(mk(l, has, k===currentDay, ()=>{
      if(k===currentDay) return;                 // текущий день не трогаем (для него — кнопка «Удалить»)
      if(state.days[k].tasks.some(t=>t.gid===task.gid))
        state.days[k].tasks=state.days[k].tasks.filter(t=>t.gid!==task.gid);
      else { state.days[k].tasks.push({...task, id:uid()}); normalizeDay(k); }
      buildDayChips(task); renderTimeline(); saveSoon();
    }));
  }
}
function openEditor(id){
  const task=curTasks().find(t=>t.id===id); if(!task) return;
  editingId=id;
  edName.value=task.name;
  buildChips(task);
  buildDayChips(task);
  edDur.textContent=fmtDur(task.dur);
  edStart.value=fmtTime(task.start);
  editorOverlay.hidden=false;
}
function closeEditor(){ editorOverlay.hidden=true; editingId=null; }

edName.addEventListener("input", ()=>{ const t=editingTask(); if(!t) return; t.name=edName.value; renderTimeline(); saveSoon(); });
document.querySelector(".stepper").addEventListener("click", e=>{
  const b=e.target.closest("button[data-d]"); if(!b) return;
  const t=editingTask(); if(!t) return;
  t.dur=clamp(t.dur+(+b.dataset.d), 10, 24*60);
  normalize(t);                                  // нижние блоки раздвигаются
  edDur.textContent=fmtDur(t.dur); renderTimeline(); saveSoon();
});
edStart.addEventListener("change", ()=>{        // задать время начала — блок переезжает туда
  const t=editingTask(); if(!t) return;
  if(/^\d{1,2}:\d{2}$/.test(edStart.value)){
    t.start=clampStart(parseTime(edStart.value));
    normalize(t);                                // соседние раздвигаются, без наложений
    edStart.value=fmtTime(t.start);
    renderTimeline(); saveSoon();
  }
});
$("edDelete").addEventListener("click", ()=>{
  const i=curTasks().findIndex(t=>t.id===editingId);
  if(i>=0) curTasks().splice(i,1);
  closeEditor(); renderTimeline(); saveSoon();
});
$("edDeleteAll").addEventListener("click", ()=>{          // удалить эту задачу со всех дней (по gid)
  const t=editingTask(); if(!t) return;
  const gid=t.gid;
  for(const [k] of DAYS) state.days[k].tasks=state.days[k].tasks.filter(x=>x.gid!==gid);
  closeEditor(); renderTimeline(); saveSoon();
});
$("edDone").addEventListener("click", closeEditor);
$("edClose").addEventListener("click", closeEditor);
editorOverlay.addEventListener("click", e=>{ if(e.target===editorOverlay) closeEditor(); });

/* ===================== ПАНЕЛЬ ИНСТРУМЕНТОВ ===================== */
function addTaskAt(startMin){
  const dur=60;
  const t={ id:uid(), gid:uid(), name:"Новая задача", cat:"free", dur, start:clampStart(startMin) };
  curTasks().push(t); normalize(t);              // встанет на это время, соседи раздвинутся
  renderTimeline(); saveSoon();
  openEditor(t.id);
}
$("addBtn").addEventListener("click", ()=>{
  addTaskAt(layoutCurrent().endMin);             // по умолчанию — в конец дня
  scrollEl.scrollTop=scrollEl.scrollHeight;
});
dayStartInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayStartInput.value)){ curDay().start=dayStartInput.value; renderTimeline(); saveSoon(); }
});
dayEndInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayEndInput.value)){ state.settings.dayEnd=dayEndInput.value; renderTimeline(); saveSoon(); }
});

/* undo / redo: кнопки + клавиатура */
$("undoBtn").addEventListener("click", ()=>History.undo());
$("redoBtn").addEventListener("click", ()=>History.redo());
window.addEventListener("keydown", (e)=>{
  if(!(e.ctrlKey||e.metaKey)) return;
  const tag=(e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;   // не мешаем нативному undo в полях
  if(press||resizing) return;                    // не дёргать во время драга/ресайза
  const k=e.key.toLowerCase();
  if(k==="z" && !e.shiftKey){ e.preventDefault(); History.undo(); }
  else if(k==="y" || (k==="z" && e.shiftKey)){ e.preventDefault(); History.redo(); }
});
$("resetBtn").addEventListener("click", ()=>{
  if(!confirm("Сбросить все дни к стартовому шаблону?")) return;
  state=template(); Storage.save(state);
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  renderAll(); Cloud.pushSoon(); History.record(); toast("Сброшено к шаблону");
});
themeBtn.addEventListener("click", ()=>{
  state.settings.theme = state.settings.theme==="dark" ? "light" : "dark";
  applyTheme(); saveSoon();
});
function applyTheme(){
  const dark=state.settings.theme==="dark";
  document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  themeBtn.textContent = dark ? "☀️" : "🌙";
}

/* экспорт: скачать JSON + скопировать в буфер */
$("exportBtn").addEventListener("click", ()=>{
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="planner-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(json).then(()=>toast("Скачано и скопировано"),()=>toast("Файл скачан"));
  else toast("Файл скачан");
});
/* импорт */
$("importBtn").addEventListener("click", ()=>{ imText.value=""; imErr.textContent=""; importOverlay.hidden=false; });
$("imClose").addEventListener("click", ()=>importOverlay.hidden=true);
importOverlay.addEventListener("click", e=>{ if(e.target===importOverlay) importOverlay.hidden=true; });
$("imLoad").addEventListener("click", ()=>{
  try{
    const norm=validateState(JSON.parse(imText.value));
    state=norm; Storage.save(state);
    if(!state.days[currentDay]) currentDay="mon";
    importOverlay.hidden=true; renderAll(); Cloud.pushSoon(); History.record(); toast("Импортировано");
  }catch(err){ imErr.textContent="Ошибка: "+(err.message||err); }
});
/* копирование дня */
$("copyBtn").addEventListener("click", ()=>{
  copyDays.innerHTML="";
  for(const [k,l] of DAYS){
    if(k===currentDay) continue;
    const b=document.createElement("button");
    b.textContent=l+(k===TODAY_KEY?" •":"");
    b.onclick=()=>{
      state.days[k].tasks=curTasks().map(t=>({...t,id:uid()}));
      state.days[k].start=curDay().start;
      Storage.save(state); Cloud.pushSoon(); History.record(); copyOverlay.hidden=true; toast("Скопировано в «"+l+"»");
      if(k===currentDay) renderTimeline();
    };
    copyDays.appendChild(b);
  }
  copyOverlay.hidden=false;
});
$("cpClose").addEventListener("click", ()=>copyOverlay.hidden=true);
copyOverlay.addEventListener("click", e=>{ if(e.target===copyOverlay) copyOverlay.hidden=true; });

/* тост */
let _toastTimer=null;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show");
  if(_toastTimer) clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1800); }

/* ===================== СТАРТ ===================== */
function init(){
  const loaded=Storage.load();
  if(loaded){ try{ state=validateState(loaded); }catch(e){ state=template(); } }
  else state=template();
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  applyTheme();
  renderTabs();
  dayStartInput.value=curDay().start;
  dayEndInput.value=(state.settings.dayEnd)||"22:00";
  renderTimeline();
  History.init();                      // базовый снимок для undo/redo
  setInterval(positionNowLine, 30000); // линия «сейчас» — раз в 30с
  Cloud.init();                        // подключаем облако поверх локального режима
}
init();
</script>
