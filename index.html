<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Планировщик дня и недели</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== ТЁПЛАЯ «БЛОКНОТНАЯ» ТЕМА ===================== */
:root{
  /* бумага */
  --paper-desk:oklch(0.928 0.018 82); --paper-rail:oklch(0.962 0.013 86); --paper-page:oklch(0.965 0.012 88);
  /* чернила */
  --ink:oklch(0.33 0.025 55); --ink-head:oklch(0.30 0.03 50); --ink-soft:oklch(0.50 0.022 60); --ink-faint:oklch(0.64 0.02 65);
  /* бренд (терракота) */
  --brand:oklch(0.585 0.13 34); --brand-strong:oklch(0.54 0.135 34); --on-brand:oklch(0.98 0.02 80);
  --track:oklch(0.9 0.016 82);
  --r-btn:10px; --r-card:14px; --r-page:20px; --r-rail:18px;
  --shadow-page:0 1px 2px oklch(0.5 0.03 60/0.04), 0 12px 32px oklch(0.5 0.03 60/0.06);
  --shadow-brand:0 2px 5px oklch(0.585 0.13 34/0.3), inset 0 1px 0 oklch(0.98 0.02 80/0.2);
  /* алиасы старых имён -> тёплая палитра (чтобы не переписывать каждое правило) */
  --surface:var(--paper-page); --surface2:var(--paper-desk); --panel:var(--paper-rail);
  --text:var(--ink); --muted:var(--ink-soft); --line:oklch(0.86 0.022 80);
  --grid:oklch(0.88 0.018 82/0.6); --grid2:oklch(0.86 0.03 60);
  --now:oklch(0.56 0.16 27); --accent:var(--brand);
  --shadow:var(--shadow-page);
}
[data-theme="dark"]{
  --paper-desk:oklch(0.205 0.012 70); --paper-rail:oklch(0.245 0.012 70); --paper-page:oklch(0.255 0.012 72);
  --ink:oklch(0.92 0.015 80); --ink-head:oklch(0.95 0.015 80); --ink-soft:oklch(0.75 0.015 75); --ink-faint:oklch(0.62 0.015 72);
  --brand:oklch(0.62 0.12 34); --brand-strong:oklch(0.66 0.13 34); --on-brand:oklch(0.99 0.01 80);
  --track:oklch(0.34 0.012 72);
  --line:oklch(0.36 0.014 72); --grid:oklch(0.42 0.012 72/0.5); --grid2:oklch(0.44 0.02 60);
  --now:oklch(0.64 0.16 27);
  --surface:var(--paper-page); --surface2:var(--paper-desk); --panel:var(--paper-rail);
  --text:var(--ink); --muted:var(--ink-soft); --accent:var(--brand);
  --shadow:0 12px 32px oklch(0 0 0/0.45);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--paper-desk); color:var(--ink);
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
}
.serif{ font-family:"Newsreader",Georgia,"Times New Roman",serif; }
body.dragging-active{ user-select:none; -webkit-user-select:none; cursor:grabbing; }
button,input,textarea{font:inherit;color:inherit}
button{cursor:pointer}
.num{ font-variant-numeric:tabular-nums; }

/* ===================== РАСКЛАДКА ===================== */
.wrap{ max-width:1500px; margin:0 auto; width:100%; }
.appbody{ flex:1; min-height:0; overflow:hidden; background:var(--paper-desk); }
.body-in{ display:flex; gap:26px; align-items:stretch; height:100%; padding:22px 28px 0; }
main{ flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; }

/* ===================== ШАПКА ===================== */
header{
  flex-shrink:0; position:relative; z-index:40;
  background:oklch(0.952 0.014 84/0.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
[data-theme="dark"] header{ background:oklch(0.245 0.012 70/0.92); }
.header-in{ display:flex; align-items:center; gap:14px; padding:12px 28px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:11px; margin-right:auto; }
.brand .logo{ width:40px; height:40px; border-radius:12px; background:var(--brand); color:var(--on-brand);
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-brand); flex-shrink:0; }
.brand .logo svg{ width:20px; height:20px; }
.brand .wordmark{ font-size:21px; font-weight:600; color:var(--ink-head); line-height:1.05; }
.brand .sub{ font-size:11.5px; color:var(--ink-faint); margin-top:2px; }
.tools{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.tools button{
  background:var(--paper-page); border:1px solid var(--line); color:var(--ink-soft);
  border-radius:var(--r-btn); padding:9px 13px; font-size:13px; font-weight:500; transition:.15s;
}
.tools button:hover{ background:oklch(0.93 0.02 82); color:var(--ink); }
[data-theme="dark"] .tools button:hover{ background:oklch(0.3 0.012 72); }
.tools button.icon{ width:38px; height:38px; padding:0; font-size:17px;
  display:inline-flex; align-items:center; justify-content:center; }
.tools button.primary{ background:var(--brand); border-color:transparent; color:var(--on-brand);
  font-weight:600; box-shadow:var(--shadow-brand); padding:9px 17px; }
.tools button.primary:hover{ background:var(--brand-strong); color:var(--on-brand); }
.tools #resetBtn{ color:var(--brand); }
.tools button:disabled{ opacity:.3; cursor:default; }
.tools button:disabled:hover{ background:var(--paper-page); color:var(--ink-soft); }
/* пилюля «окно дня» */
.win{ display:flex; align-items:center; gap:7px; height:38px; padding:0 13px;
  background:var(--paper-page); border:1px solid var(--line); border-radius:var(--r-btn); }
.win .lbl{ font-size:10px; font-weight:700; letter-spacing:.13em; color:var(--ink-faint); }
.win input[type=time]{ width:48px; background:transparent; border:0; padding:0; font-size:13.5px;
  font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
.win input[type=time]::-webkit-calendar-picker-indicator{ display:none; }
.win .arrow{ color:var(--ink-faint); }
.tools .divider{ width:1px; height:26px; background:var(--line); margin:0 4px; }
/* аккаунт */
.auth{ display:flex; align-items:center; gap:9px; }
.auth .avatar{ width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; }
.auth .avatar.letter{ background:oklch(0.46 0.08 155); color:var(--on-brand);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
.auth .who{ display:flex; flex-direction:column; line-height:1.15; }
.auth .who b{ font-size:13px; font-weight:600; color:var(--ink); }
.auth .who span{ font-size:11px; color:var(--ink-faint); }
.auth button{ background:transparent; border:1px solid var(--line); color:var(--ink-soft);
  border-radius:var(--r-btn); padding:8px 12px; font-size:13px; }
.auth button.primary{ background:var(--brand); border-color:transparent; color:var(--on-brand);
  font-weight:600; box-shadow:var(--shadow-brand); }

/* ===================== ВКЛАДКИ ДНЕЙ (сегмент-контрол) ===================== */
.tabs{
  display:flex; gap:0; padding:6px; background:var(--track);
  border:1px solid var(--line); border-radius:15px; flex-shrink:0;
}
.tab{
  flex:1; text-align:center; background:transparent; border:0; color:var(--ink-soft);
  border-radius:11px; padding:0; height:46px; font-size:14px; font-weight:500; transition:.15s;
}
.tab:hover{ background:var(--paper-page); color:var(--ink); }
.tab.today{ color:var(--brand); }
.tab.active{ background:var(--brand); color:var(--on-brand); font-weight:600;
  box-shadow:0 1px 3px oklch(0.585 0.13 34/0.3); }
.tab.active:hover{ background:var(--brand); color:var(--on-brand); }

/* ===================== ЗАГОЛОВОК ДНЯ ===================== */
.day-header{ display:flex; align-items:baseline; gap:14px; padding:18px 2px 14px; flex-shrink:0; flex-wrap:wrap; }
.day-header .dname{ font-size:30px; font-weight:600; color:var(--ink-head); }
.day-header .dsum{ font-size:14px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
.day-header .dsum b{ color:var(--ink); font-weight:600; }

/* ===================== ЛЕВАЯ КОЛОНКА (ИТОГИ) ===================== */
.rail{ width:312px; flex-shrink:0; align-self:flex-start; }
.rail-card{ background:var(--paper-rail); border:1px solid oklch(0.88 0.02 80); border-radius:var(--r-rail);
  padding:22px; box-shadow:var(--shadow-page); }
[data-theme="dark"] .rail-card{ border-color:var(--line); }
.eyebrow{ font-size:11px; font-weight:700; letter-spacing:.14em; color:var(--ink-faint); text-transform:uppercase; }
.rail .r-day{ font-size:27px; font-weight:600; color:var(--ink-head); margin:7px 0 2px; }
.rail .r-range{ font-size:13px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
.rail .r-metrics{ display:flex; gap:28px; margin:16px 0 2px; }
.rail .r-metrics .v{ font-size:19px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
.rail .r-metrics .k{ font-size:11px; color:var(--ink-faint); margin-top:1px; }
.rail hr{ border:0; border-top:1px solid oklch(0.89 0.018 82); margin:18px 0; }
[data-theme="dark"] .rail hr{ border-color:var(--line); }
.rail .sec-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
.rail .sec-head .total{ font-size:12px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
.cat-row{ margin:11px 0; }
.cat-row .cr-top{ display:flex; align-items:center; gap:8px; font-size:13px; }
.cat-row .dot{ width:9px; height:9px; border-radius:50%; background:var(--cat); flex-shrink:0; }
.cat-row .cr-name{ color:var(--ink); }
.cat-row .cr-h{ margin-left:auto; color:var(--ink-soft); font-variant-numeric:tabular-nums; font-size:12.5px; }
.cat-row .bar{ height:5px; border-radius:3px; background:var(--track); margin-top:6px; overflow:hidden; }
.cat-row .bar i{ display:block; height:100%; border-radius:3px; background:var(--cat); transition:width .25s; }

/* ===================== ТАЙМЛАЙН-«СТРАНИЦА» ===================== */
.timeline-scroll{
  flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; touch-action:pan-y;
  background:var(--paper-page); border:1px solid oklch(0.88 0.02 80); border-radius:var(--r-page);
  box-shadow:var(--shadow-page); padding:18px 24px 26px; margin-bottom:22px;
}
[data-theme="dark"] .timeline-scroll{ border-color:var(--line); }
.timeline{
  position:relative; margin-left:54px;
  background-image:repeating-linear-gradient(to bottom, transparent 0 59px, var(--grid) 59px 60px);
}
/* карточка задачи */
.block{
  position:absolute; left:0; right:4px; box-sizing:border-box;
  border-radius:var(--r-card); overflow:hidden;
  background:var(--cb); border:1px solid var(--cd);
  transition:top .18s cubic-bezier(.2,.7,.3,1), box-shadow .15s;
  touch-action:pan-y; user-select:none; -webkit-user-select:none;
}
.block::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--cat); }
.block:hover{ box-shadow:0 4px 14px color-mix(in oklch, var(--cat) 22%, transparent); }
.timeline.resizing .block{ transition:none; }
.block.dragging{
  transition:none; z-index:30; cursor:grabbing; opacity:.99; transform:scale(1.012);
  box-shadow:0 10px 28px color-mix(in oklch, var(--cat) 28%, transparent);
}
.block[data-pinned="1"] .b-time::after{ content:" 📌"; }
.grip{
  position:absolute; left:7px; top:0; bottom:0; width:16px; z-index:2;
  display:flex; align-items:center; justify-content:center;
  color:var(--cat); opacity:.4; cursor:grab; touch-action:none; font-size:12px; letter-spacing:-2px;
}
.block:hover .grip{ opacity:.75; }
.grip:active{ cursor:grabbing; }
.resize-handle{ position:absolute; left:0; right:0; bottom:0; height:13px; cursor:ns-resize; touch-action:none; }
.resize-handle::after{
  content:""; position:absolute; left:50%; bottom:4px; transform:translateX(-50%);
  width:34px; height:3px; border-radius:3px; background:var(--cat); opacity:.32;
}
.b-body{ padding:13px 16px 13px 28px; }
.b-top{ display:flex; align-items:baseline; gap:10px; }
.b-time{ font-size:13px; font-weight:600; color:var(--cat); font-variant-numeric:tabular-nums; flex-shrink:0; }
.b-name{ font-size:16.5px; font-weight:600; color:color-mix(in oklch, var(--cat) 40%, var(--ink));
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.b-meta{ display:flex; gap:7px; margin-top:3px; font-size:12.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
.b-tag{ position:absolute; top:11px; right:13px; font-size:11px; font-weight:600; color:var(--cat);
  border:1px solid color-mix(in oklch, var(--cat) 42%, transparent); border-radius:999px; padding:2px 10px; background:transparent; }
/* высокие блоки: внутренняя часовая разметка + тихий маркер снизу */
.block.tall{ background-image:repeating-linear-gradient(to bottom, transparent 0 59px, color-mix(in oklch, var(--cat) 30%, transparent) 59px 60px); background-position-y:var(--gridoff,0); }
.block .b-marker{ position:absolute; left:28px; bottom:10px; font-size:11px; color:var(--cat); opacity:.65; display:flex; align-items:center; gap:6px; }
.block .b-marker .d{ width:5px; height:5px; border-radius:50%; background:var(--cat); }
.block:not(.tall) .b-marker{ display:none; }
/* короткие блоки: один ряд, без ресайз-полосы */
.block.short .b-body{ display:flex; align-items:center; gap:9px; height:100%; padding-top:0; padding-bottom:0; }
.block.short .b-top{ gap:9px; }
.block.short .b-name{ font-size:14px; }
.block.short .b-meta{ margin-top:0; }
.block.short .b-until{ display:none; }
.block.short .resize-handle{ display:none; }
.block.short .b-tag{ top:50%; transform:translateY(-50%); }
.block.short .b-marker{ display:none; }

/* пустые промежутки = свободное время; тап = добавить задачу */
.slot{
  position:absolute; left:0; right:4px; box-sizing:border-box; cursor:pointer;
  background:oklch(0.95 0.012 86/0.55); border:1px solid var(--line); border-radius:13px;
  display:flex; align-items:center; justify-content:center; gap:9px;
  font-size:13px; color:var(--ink-soft); overflow:hidden; transition:.15s;
}
[data-theme="dark"] .slot{ background:oklch(0.28 0.012 72/0.5); }
.slot .plus{ width:22px; height:22px; border-radius:50%; border:1.5px solid var(--ink-faint);
  display:flex; align-items:center; justify-content:center; color:var(--ink-faint); flex-shrink:0; font-size:14px; line-height:1; }
.slot b{ color:var(--ink); font-weight:600; }
.slot:hover{ background:oklch(0.93 0.03 70/0.5); border-color:oklch(0.84 0.05 50); }
.slot:hover .plus{ border-color:var(--brand); color:var(--brand); }
.timeline.resizing .slot{ display:none; }
/* часовые метки слева */
.hour{
  position:absolute; left:-54px; width:44px; text-align:right; margin-top:-7px;
  font-size:11.5px; color:var(--ink-faint); font-variant-numeric:tabular-nums; pointer-events:none;
}
.now-line{
  position:absolute; left:0; right:0; height:0; z-index:20;
  border-top:2px solid var(--now); pointer-events:none;
}
.now-line::before{ content:""; position:absolute; left:-5px; top:-5px; width:9px; height:9px; border-radius:50%;
  background:var(--now); animation:nowpulse 2.2s infinite; }
.now-line span{
  position:absolute; left:-52px; top:-9px; background:var(--now); color:var(--on-brand);
  font-size:10px; font-weight:700; padding:1px 7px; border-radius:999px;
}
@keyframes nowpulse{ 0%{ box-shadow:0 0 0 0 oklch(0.56 0.16 27/0.5);} 70%{ box-shadow:0 0 0 7px oklch(0.56 0.16 27/0);} 100%{ box-shadow:0 0 0 0 oklch(0.56 0.16 27/0);} }

/* ===================== МОДАЛКИ ===================== */
.overlay{
  position:fixed; inset:0; background:rgba(10,15,25,.45);
  display:flex; align-items:flex-end; justify-content:center; z-index:100;
}
.overlay[hidden]{display:none}
.sheet{
  width:100%; max-width:480px; background:var(--panel); color:var(--text);
  border-radius:16px 16px 0 0; padding:16px; box-shadow:var(--shadow);
  max-height:88vh; overflow:auto;
}
@media(min-width:560px){
  .overlay{align-items:center}
  .sheet{border-radius:16px}
}
.sheet-head{ display:flex; align-items:center; margin-bottom:12px; }
.sheet-head h3{ margin:0; font-size:17px; }
.sheet-head .x{ margin-left:auto; background:none; border:none; font-size:18px; color:var(--muted); }
.fld{ display:block; margin-bottom:14px; }
.fld>span{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
.fld.row{ display:flex; align-items:center; justify-content:space-between; }
.fld.row>span{ margin:0; }
.sheet input[type=text], .sheet input[type=time], .sheet textarea{
  width:100%; background:var(--surface); border:1px solid var(--line);
  color:var(--text); border-radius:9px; padding:9px 10px;
}
.sheet textarea{ resize:vertical; font-family:ui-monospace,Consolas,monospace; font-size:12px; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{
  padding:6px 11px; border-radius:999px; font-size:13px;
  background:color-mix(in srgb, var(--cat) 14%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 40%, var(--surface));
  color:color-mix(in srgb, var(--cat) 78%, var(--text));
}
.chip.on{ background:color-mix(in srgb, var(--cat) 70%, var(--surface)); color:#fff; font-weight:700;
  border-color:color-mix(in srgb, var(--cat) 80%, var(--surface)); }
/* чипы выбора дней в редакторе */
.daychips .daychip{ --cat:var(--accent); padding:6px 10px; min-width:38px; }
.daychips .daychip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
.daychips .daychip.cur{ box-shadow:0 0 0 2px var(--accent) inset; font-weight:700; }
.stepper{ display:flex; align-items:center; gap:8px; }
.stepper button{
  width:46px; height:38px; border-radius:9px; font-weight:700;
  background:var(--surface); border:1px solid var(--line); color:var(--text);
}
.stepper b{ min-width:80px; text-align:center; font-size:16px; font-variant-numeric:tabular-nums; }
.sheet-actions{ display:flex; gap:8px; margin-top:6px; }
.sheet-actions button{ flex:1; padding:11px; border-radius:10px; border:1px solid var(--line);
  background:var(--surface); color:var(--text); font-weight:600; }
.sheet-actions .primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
.sheet-actions .danger{ background:transparent; border-color:#e0485a; color:#e0485a; }
.copy-days{ display:flex; flex-wrap:wrap; gap:8px; }
.copy-days button{ flex:1 0 60px; padding:12px; border-radius:10px;
  background:var(--surface); border:1px solid var(--line); color:var(--text); font-weight:600; }
.im-err{ color:#e0485a; font-size:12px; min-height:16px; margin:-6px 0 10px; }

/* ===================== ТОСТ ===================== */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
  background:var(--text); color:var(--surface); padding:9px 16px; border-radius:999px;
  font-size:13px; font-weight:600; opacity:0; transition:.2s; z-index:200; pointer-events:none;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ===================== АДАПТИВ ===================== */
@media(max-width:900px){
  .header-in{ padding:10px 14px; gap:10px; }
  .body-in{ padding:14px 14px 0; gap:0; }
  .rail{ display:none; }
  .brand .sub{ display:none; }
  .tools button{ padding:8px 11px; }
  .day-header{ padding:14px 2px 12px; }
  .day-header .dname{ font-size:24px; }
  .timeline-scroll{ padding:14px 14px 22px; }
  .timeline{ margin-left:44px; }
  .hour{ left:-44px; width:36px; font-size:10.5px; }
  .now-line span{ left:-42px; }
  .b-name{ font-size:15px; }
}
</style>
</head>
<body>

<header>
  <div class="wrap header-in">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></div>
      <div>
        <div class="wordmark serif">Планировщик</div>
        <div class="sub" id="brandSub"></div>
      </div>
    </div>
    <div class="tools">
      <button id="undoBtn" class="icon" title="Отменить (Ctrl+Z)" disabled>↺</button>

const CATS = {

function isoWeek(d){ const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-day+3); const first=new Date(Date.UTC(t.getUTCFullYear(),0,4));

const TODAY_KEY = ["sun","mon","tue","wed","thu","fri","sat"][new Date().getDay()];

/* Минимальная база на «время-треке» 07:00–23:00. Остальное добавляется по надобности.

const _work = (k) => (k==="mon"||k==="wed"||k==="fri")

const SEED = {

/* ===================== УТИЛИТЫ ===================== */
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const deepClone = o => JSON.parse(JSON.stringify(o));
const roundTo5 = m => Math.round(m/5)*5;
let _uid = 0;
function uid(){ _uid++; return "t"+Date.now().toString(36)+"_"+_uid.toString(36); }
function parseTime(s){ const m=/^(\d{1,2}):(\d{2})$/.exec(String(s||"")); if(!m) return 420; return (+m[1])*60+(+m[2]); }
function fmtTime(min){ min=Math.round(min); min=((min%1440)+1440)%1440; const h=Math.floor(min/60), m=min%60; return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); }
function fmtDur(min){ const h=Math.floor(min/60), m=min%60; if(h&&m) return h+"ч "+m+"м"; if(h) return h+"ч"; return m+"м"; }

/* ===================== ХРАНИЛИЩЕ (изолированный модуль) =====================
   load/save вынесены сюда, чтобы позже заменить localStorage на Firebase Firestore,
   не трогая остальную логику. */
const Storage = (() => {
  const KEY = "dayPlanner.v1";
  return {
    load(){ try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } },
    save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} },
  };
})();
let _saveTimer=null;
function saveSoon(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>Storage.save(state),250); // оффлайн-кэш
  Cloud.pushSoon();                                   // облако (если вошёл)
  History.record();                                   // шаг истории (undo/redo)
}

/* ===================== ОБЛАКО (Firebase Firestore + Auth) =====================
   Тот же контракт, что у Storage: грузим/пишем ВЕСЬ объект state.
   - не вошёл  -> ничего не делаем, работает только localStorage;
   - вошёл     -> подписка onSnapshot (живой синк) + setDoc с debounce;
   - защита от эха: не пишем обратно изменение, прилетевшее из onSnapshot. */
const Cloud = (() => {
  let auth=null, db=null, user=null, unsub=null, ready=false;
  let timer=null, applyingRemote=false, lastSyncedJSON=null;
  // канонический отпечаток состояния: фиксированный порядок ключей,
  // чтобы эхо из Firestore (другой порядок ключей) распознавалось как «своё»
  const canon = s => { try{ return JSON.stringify(validateState(s)); }catch(e){ return JSON.stringify(s); } };

  function init(){
    try{
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      ready = true;
    }catch(e){ ready=false; renderAuthUI(); return; }
    // оффлайн-персистентность (молча, если не поддерживается)
    try{ enableIndexedDbPersistence(db).catch(()=>{}); }catch(e){}
    onAuthStateChanged(auth, onAuth);
    renderAuthUI();
  }

  function onAuth(u){
    user = u || null;
    renderAuthUI();
    if(unsub){ unsub(); unsub=null; }
    lastSyncedJSON = null;
    if(!user) return; // вышел -> снова чисто локальный режим
    const ref = doc(db, "schedules", user.uid);
    unsub = onSnapshot(ref, { includeMetadataChanges:true },
      (snap) => {
        if(!snap.exists()){
          // пока ответ только из кэша — НЕ затираем возможные данные в облаке (важно для второго устройства)
          if(snap.metadata && snap.metadata.fromCache) return;
          // сервер подтвердил, что документа нет -> первичная миграция локальных данных
          pushNow();
          return;
        }
        const data = snap.data();
        if(!data || !data.state) return;
        const incoming = canon(data.state);
        if(incoming === lastSyncedJSON) return;            // наш же эхо-снимок
        if(incoming === canon(state)){ lastSyncedJSON = incoming; return; } // те же данные, что уже есть
        lastSyncedJSON = incoming;
        applyRemote(data.state);                            // настоящее изменение из облака
      },
      (err) => { toast("⚠ нет синхронизации"); }
    );
  }

  function applyRemote(remoteState){
    let norm;
    try{ norm = validateState(remoteState); }catch(e){ return; }
    applyingRemote = true;
    state = norm;
    Storage.save(state);                            // обновляем оффлайн-кэш
    if(!state.days[currentDay]) currentDay = "mon";
    renderAll();
    History.reset();                                // прилетело из облака — историю обнуляем
    applyingRemote = false;
  }

  function pushSoon(){
    if(!ready || !user || applyingRemote) return;
    if(timer) clearTimeout(timer);
    timer = setTimeout(pushNow, 600);
  }

  async function pushNow(){
    if(!ready || !user) return;
    try{
      lastSyncedJSON = canon(state);                 // канон. отпечаток нашей записи (для отсечки эха)
      await setDoc(doc(db,"schedules",user.uid),
                   { state, updatedAt: serverTimestamp() }, { merge:true });
    }catch(e){ toast("⚠ офлайн / нет синка"); }
  }

  async function login(){
    if(!ready){ toast("Firebase недоступен"); return; }
    try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e){ if(e && e.code!=="auth/popup-closed-by-user") toast("Не удалось войти"); }
  }
  async function logout(){ try{ await signOut(auth); }catch(e){} }

  return { init, login, logout, pushSoon, get user(){ return user; }, get ready(){ return ready; } };
})();

/* кнопка входа / профиль в шапке */
function renderAuthUI(){
  const el = document.getElementById("authArea");
  if(!el) return;

    const email=u.email||"";
    const name=u.displayName || email.split("@")[0] || "Аккаунт";

  } else {
    el.innerHTML = '<button id="loginBtn" class="primary">Войти через Google</button>';
    const b = el.querySelector("#loginBtn");
    if(b) b.onclick = ()=>Cloud.login();

}

/* ===================== ИСТОРИЯ (undo / redo) =====================
   Снимки всего state. Быстрые правки коалесятся по паузе (один шаг истории).
   record() дёргается на каждое локальное изменение (из saveSoon). */
const History = (() => {
  let undo=[], redo=[], baseline="null", timer=null;
  const MAX=120;
  const snap=()=>JSON.stringify(state);
  function init(){ baseline=snap(); undo=[]; redo=[]; updateButtons(); }
  function reset(){ init(); }                 // после прихода из облака — историю обнуляем
  function record(){                          // изменение: запланировать коммит с коалесингом
    if(timer) clearTimeout(timer);
    timer=setTimeout(commit, 350);
    updateButtons();
  }
  function commit(){
    timer=null;
    const cur=snap();
    if(cur===baseline) return;
    undo.push(baseline); if(undo.length>MAX) undo.shift();
    redo=[]; baseline=cur; updateButtons();
  }
  function flush(){ if(timer){ clearTimeout(timer); timer=null; } commit(); }
  function apply(json){
    state=JSON.parse(json);
    if(!state.days[currentDay]) currentDay="mon";
    baseline=json;
    Storage.save(state); Cloud.pushSoon();    // применённое состояние тоже кэшируем и синкаем
    renderAll(); updateButtons();
  }
  function undoOp(){
    flush();
    if(!undo.length) return;
    redo.push(baseline);
    apply(undo.pop());
    toast("Отменено");
  }
  function redoOp(){
    flush();
    if(!redo.length) return;
    undo.push(baseline);
    apply(redo.pop());
    toast("Возвращено");
  }
  function updateButtons(){
    const ub=document.getElementById("undoBtn"), rb=document.getElementById("redoBtn");
    if(!ub) return;
    const pending = snap()!==baseline;
    ub.disabled = !(undo.length>0 || pending);
    rb.disabled = redo.length===0;
  }
  return { init, reset, record, undo:undoOp, redo:redoOp };
})();

/* ===================== СОСТОЯНИЕ ===================== */
function template(){
  const days={};
  for(const [k] of DAYS){
    days[k]={ start:"07:00", tasks: SEED[k].map(a=>({id:uid(), name:a[0], cat:a[1], start:parseTime(a[2]), dur:a[3], gid:a[4]})) };
  }
  return { version:1, settings:{theme:"light", dayEnd:"23:00"}, days };
}
function normTask(t){
  return {
    id: t && t.id ? String(t.id) : uid(),
    name: String((t&&t.name) ?? "Задача"),
    cat: (t && CATS[t.cat]) ? t.cat : "free",
    dur: clamp(roundTo5(+( (t&&t.dur) || 60)), 10, 24*60),
    // время старта; у старых данных поля нет -> проставим последовательно ниже
    start: (t && t.start!=null && isFinite(t.start)) ? clamp(roundTo5(+t.start),0,24*60) : null,
    gid: (t && t.gid) ? String(t.gid) : uid(),   // группа «один блок на разных днях»
  };
}
function validateState(obj){
  if(!obj || typeof obj!=="object") throw new Error("не объект");
  if(!obj.days || typeof obj.days!=="object") throw new Error("нет поля days");
  const _s=obj.settings||{};
  const out={ version:1, settings:{
    theme:(_s.theme==="dark")?"dark":"light",
    dayEnd:/^\d{1,2}:\d{2}$/.test(_s.dayEnd)?_s.dayEnd:"23:00"
  }, days:{} };
  for(const [k] of DAYS){
    const d=obj.days[k];
    if(!d || !Array.isArray(d.tasks)) throw new Error("день "+k+" повреждён");
    out.days[k]={ start:/^\d{1,2}:\d{2}$/.test(d.start)?d.start:"07:00", tasks:d.tasks.map(normTask) };
    // миграция старых данных (без поля start) -> расставляем встык от старта дня
    let cur=parseTime(out.days[k].start);
    for(const t of out.days[k].tasks){ if(t.start==null) t.start=cur; cur=t.start+t.dur; }
    out.days[k].tasks.sort((a,b)=>a.start-b.start);
  }
  return out;
}

let state, currentDay, editingId=null;

const curDay     = () => state.days[currentDay];
const curTasks   = () => curDay().tasks;
const winStartMin= () => parseTime(curDay().start);                              // верх трека-окна
const winEndMin  = () => parseTime((state.settings && state.settings.dayEnd) || "23:00"); // низ окна
const BLOCK_GAP=6, BLOCK_VIS_MIN=8;                                  // косметический зазор между блоками
const visH = h => Math.max(h - BLOCK_GAP, BLOCK_VIS_MIN);           // видимая высота (не влияет на время)
const clampStart = s => clamp(roundTo5(s), winStartMin(), 24*60);  // время старта не раньше начала окна

/* ===================== ВРЕМЯ-ТРЕК =====================
   У каждой задачи СВОЁ время старта (task.start, минуты от полуночи).
   Свободное время между задачами — просто пустые промежутки на треке.
   Наложений нет: при раскладке блоки каскадно раздвигаются вниз. */
function computeLayout(tasks, vs){
  const sorted=[...tasks].sort((a,b)=>a.start-b.start);
  let cursor=-1e9; const items=[];
  for(const t of sorted){
    const s=Math.max(t.start, cursor);     // не раньше конца предыдущего -> без наложений
    items.push({ task:t, top:s-vs, height:t.dur, startMin:s });
    cursor=s+t.dur;
  }
  const endMin = items.length ? items[items.length-1].startMin+items[items.length-1].height : vs;
  return { items, endMin };
}
function viewStart(){ let m=winStartMin(); for(const t of curTasks()) if(t.start<m) m=t.start; return m; }
const layoutCurrent = () => computeLayout(curTasks(), viewStart());
function viewEnd(){ return Math.max(winEndMin(), layoutCurrent().endMin); }

/* Раскладка с «якорем»: активный блок (anchor) стоит на своём времени,
   остальные раздвигаются вокруг него (вверх до якоря, вниз после). Возвращает Map task->start. */
function placeAnchored(tasks, anchor){
  const aStart=anchor.start, aEnd=anchor.start+anchor.dur;
  const others=tasks.filter(t=>t!==anchor).sort((a,b)=>a.start-b.start);
  const above=[], below=[];
  for(const t of others){ if(t.start+t.dur<=aStart) above.push(t); else below.push(t); }
  const out=new Map(); out.set(anchor, aStart);
  let top=aStart;                                   // пакуем «верхних» вверх, конец <= aStart
  for(let i=above.length-1;i>=0;i--){ const t=above[i]; const s=Math.min(t.start, top-t.dur); out.set(t,s); top=s; }
  let cur=aEnd;                                      // «нижних» — вниз от конца якоря
  for(const t of below){ const s=Math.max(t.start,cur); out.set(t,s); cur=s+t.dur; }
  return out;
}
/* Привести данные к виду без наложений и пересортировать (после любого изменения). */
function normalize(anchor){
  if(anchor){ const map=placeAnchored(curTasks(), anchor); for(const [t,s] of map) t.start=s; }
  else { const items=computeLayout(curTasks(),0).items; for(const it of items) it.task.start=it.startMin; }
  curDay().tasks=[...curTasks()].sort((a,b)=>a.start-b.start);
}
function normalizeDay(dayKey){   // привести произвольный день (для копий на другие дни)
  const arr=state.days[dayKey].tasks;
  const items=computeLayout(arr,0).items;
  for(const it of items) it.task.start=it.startMin;
  state.days[dayKey].tasks=[...arr].sort((a,b)=>a.start-b.start);
}
/* Синхронизировать правку задачи на ВСЕ дни, где она есть (та же группа gid).
   Копируем название/категорию/длительность/старт, затем раздвигаем эти дни. */
function syncGroup(src){
  for(const [k] of DAYS){
    if(k===currentDay) continue;                 // текущий день уже разложен вызывающим
    const d=state.days[k]; let touched=false;
    for(const t of d.tasks){
      if(t.gid===src.gid && t.id!==src.id){
        t.name=src.name; t.cat=src.cat; t.dur=src.dur; t.start=src.start; touched=true;
      }
    }
    if(touched) normalizeDay(k);
  }
}

/* ===================== DOM-ССЫЛКИ ===================== */
const $ = id => document.getElementById(id);
const timelineEl=$("timeline"), scrollEl=$("scrollEl"), nowLine=$("nowLine");
const tabsEl=$("tabs"), dayHeaderEl=$("dayHeader"), railEl=$("rail"), brandSubEl=$("brandSub"),
      dayStartInput=$("dayStart"), dayEndInput=$("dayEnd");
const editorOverlay=$("editorOverlay"), edName=$("edName"), edChips=$("edChips"),
      edDur=$("edDur"), edStart=$("edStart"), edDays=$("edDays");
const importOverlay=$("importOverlay"), imText=$("imText"), imErr=$("imErr");
const copyOverlay=$("copyOverlay"), copyDays=$("copyDays");
const themeBtn=$("themeBtn"), toastEl=$("toast");

/* ===================== РЕНДЕР ===================== */
function makeBlock(task){
  const c=CATS[task.cat];
  const el=document.createElement("div");
  el.className="block cat-"+task.cat;
  el.dataset.id=task.id;
  el.style.setProperty("--cat", c.color);
  el.style.setProperty("--cb", c.bg||c.color);
  el.style.setProperty("--cd", c.border||c.color);
  el.innerHTML =
    '<div class="grip">⠿</div>'+
    '<div class="b-body">'+
      '<div class="b-top"><span class="b-time"></span><span class="b-name"></span></div>'+
      '<div class="b-meta"><span class="b-dur"></span><span class="b-until"></span></div>'+
    '</div>'+
    '<div class="b-tag"></div>'+
    '<div class="resize-handle"></div>';
  el.querySelector(".b-name").textContent=task.name;
  el.querySelector(".b-dur").textContent=fmtDur(task.dur);
  el.querySelector(".b-tag").textContent=c.label;
  el.addEventListener("pointerdown", e=>onPointerDown(e, task, el));
  return el;
}
function positionBlock(el, item){
  el.style.top=item.top+"px";
  el.style.height=visH(item.height)+"px"; // высота слота = длительности, видимая чуть меньше (зазор)
  el.classList.toggle("short", item.height < 30); // короткий блок -> тап открывает редактор
  el.classList.toggle("tall", item.height >= 150);
  el.querySelector(".b-time").textContent=fmtTime(item.startMin);
  const u=el.querySelector(".b-until"); if(u) u.textContent="· до "+fmtTime(item.startMin+item.height);
  const pageOff=(60-(viewStart()%60))%60;                 // совместить внутр. часовую сетку со страницей
  el.style.setProperty("--gridoff", ((((pageOff-item.top)%60)+60)%60)+"px");
}
function renderTimeline(){
  timelineEl.querySelectorAll(".block,.slot,.hour").forEach(n=>n.remove());
  const vs=viewStart(), ve=viewEnd();
  const lay=computeLayout(curTasks(), vs);
  timelineEl.style.height=Math.max(ve-vs, 120)+"px";     // трек всегда на всё окно 06:00–22:00
  timelineEl.style.backgroundPositionY=((60-(vs%60))%60)+"px";
  // часовые метки слева
  for(let m=Math.ceil(vs/60)*60; m<=ve; m+=60){
    const h=document.createElement("div"); h.className="hour"; h.style.top=(m-vs)+"px";
    h.textContent=fmtTime(m); timelineEl.appendChild(h);
  }
  // свободные промежутки (тап = добавить задачу на это время)
  const addSlot=(a,b)=>{ if(b-a<5) return;
    const s=document.createElement("div"); s.className="slot";
    s.style.top=(a-vs)+"px"; s.style.height=(b-a)+"px";
    if(b-a>=24) s.innerHTML='<span class="plus">+</span><span><b>'+fmtDur(b-a)+'</b> свободно · добавить задачу</span>';
    else if(b-a>=12) s.innerHTML='<span class="plus">+</span>';
    s.addEventListener("click", ()=>addTaskAt(a));
    timelineEl.appendChild(s);
  };
  let cur=vs;
  for(const it of lay.items){ addSlot(cur, it.startMin); cur=it.startMin+it.height; }
  addSlot(cur, ve);
  // блоки
  for(const it of lay.items){ const el=makeBlock(it.task); positionBlock(el,it); timelineEl.appendChild(el); }
  positionNowLine();
  renderSummary();
}
function renderTabs(){
  tabsEl.innerHTML="";
  for(const [k,l] of DAYS){
    const b=document.createElement("button");
    b.className="tab"+(k===currentDay?" active":"")+(k===TODAY_KEY?" today":"");
    b.textContent=l;
    b.onclick=()=>switchDay(k);
    tabsEl.appendChild(b);
  }
}
function plTasks(n){ const a=n%100,b=n%10; if(a>=11&&a<=14)return n+" задач"; if(b===1)return n+" задача"; if(b>=2&&b<=4)return n+" задачи"; return n+" задач"; }
function catRow(color,label,min,frac){
  const w=Math.max(0,Math.min(1,frac))*100;
  return '<div class="cat-row" style="--cat:'+color+'">'+
    '<div class="cr-top"><span class="dot"></span><span class="cr-name">'+label+'</span><span class="cr-h">'+fmtDur(min)+'</span></div>'+
    '<div class="bar"><i style="width:'+w.toFixed(1)+'%"></i></div></div>';
}
const FREE_DOT="oklch(0.82 0.014 82)";
const busyOf=tasks=>tasks.reduce((s,t)=>s+(t.cat==="free"?0:t.dur),0);  // «занято» = без «свободных» блоков
function renderSummary(){
  const tasks=curTasks();
  const busy=busyOf(tasks);
  const win=Math.max(1, winEndMin()-winStartMin());
  const free=Math.max(0, win - busy);                          // свободно = пустые промежутки + блоки «Свободно»
  const endMin=layoutCurrent().endMin;
  const overDays=Math.floor(endMin/1440);
  const endLabel=fmtTime(endMin)+(overDays>0?" (+"+overDays+"д)":"");
  dayHeaderEl.innerHTML='<span class="dname serif">'+DAY_FULL[currentDay]+'</span>'+
    '<span class="dsum">'+plTasks(tasks.length)+' · занято <b>'+fmtDur(busy)+'</b> · свободно <b>'+fmtDur(free)+'</b></span>';
  renderRail(busy, free, endLabel, win);
}
function renderRail(busy, free, endLabel, win){
  // категории дня (без «free» — свободное сводим в одну строку, не дублируя)
  const by={}; for(const t of curTasks()){ if(t.cat==="free") continue; by[t.cat]=(by[t.cat]||0)+t.dur; }
  const order=Object.keys(by).sort((a,b)=>by[b]-by[a]);
  let catRows=""; for(const k of order) catRows+=catRow(CATS[k].color, CATS[k].label, by[k], by[k]/win);
  catRows+=catRow(FREE_DOT, "Свободно", free, free/win);
  // неделя: реальные категории + СУММАРНОЕ свободное время (окно каждого дня − занято)
  const wk={}; let wkTotal=0, weekFree=0; const end=winEndMin();
  for(const [k] of DAYS){
    const d=state.days[k]; const winD=Math.max(1, end - parseTime(d.start)); const busyD=busyOf(d.tasks);
    for(const t of d.tasks){ if(t.cat==="free") continue; wk[t.cat]=(wk[t.cat]||0)+t.dur; }
    wkTotal+=busyD; weekFree+=Math.max(0, winD-busyD);
  }
  const wkOrder=Object.keys(wk).sort((a,b)=>wk[b]-wk[a]);
  const wkMax=Math.max(1, weekFree, ...wkOrder.map(k=>wk[k]));
  let wkRows=""; for(const k of wkOrder) wkRows+=catRow(CATS[k].color, CATS[k].label, wk[k], wk[k]/wkMax);
  wkRows+=catRow(FREE_DOT, "Свободно", weekFree, weekFree/wkMax);
  railEl.innerHTML=
    '<div class="rail-card">'+
      '<div class="eyebrow">Сегодня</div>'+
      '<div class="r-day serif">'+DAY_FULL[currentDay]+'</div>'+
      '<div class="r-range">'+curDay().start+' → '+endLabel+'</div>'+
      '<div class="r-metrics">'+
        '<div><div class="v">'+fmtDur(busy)+'</div><div class="k">занято</div></div>'+
        '<div><div class="v">'+fmtDur(free)+'</div><div class="k">свободно</div></div>'+
      '</div><hr>'+
      '<div class="eyebrow">Категории дня</div>'+catRows+'<hr>'+
      '<div class="sec-head"><div class="eyebrow">Эта неделя</div><div class="total">всего '+fmtDur(wkTotal)+'</div></div>'+wkRows+
    '</div>';
}
function positionNowLine(){
  if(currentDay!==TODAY_KEY){ nowLine.style.display="none"; return; }
  const now=new Date(); const nm=now.getHours()*60+now.getMinutes();
  const vs=viewStart(); const off=nm-vs;
  if(off<0||off>(viewEnd()-vs)){ nowLine.style.display="none"; return; }
  nowLine.style.display="block"; nowLine.style.top=off+"px";
}
function switchDay(k){ currentDay=k; closeEditor(); dayStartInput.value=curDay().start; renderTabs(); renderTimeline(); }
function renderAll(){ applyTheme(); renderTabs(); dayStartInput.value=curDay().start; dayEndInput.value=(state.settings.dayEnd)||"22:00"; renderTimeline(); }

/* ===================== DRAG (Pointer Events) =====================
   На телефоне: тащить за «ручку» (⠿) — она с touch-action:none, поэтому
   страница не скроллится во время драга; тело блока скроллит список (pan-y)
   и открывает редактор по тапу. На мыши можно тащить за любую часть блока. */
let press=null, resizing=null;

function onPointerDown(e, task, el){
  if(e.target.closest(".resize-handle")){ startResize(e, task, el); return; }
  if(press||resizing) return;
  const onGrip = !!e.target.closest(".grip");
  const eligible = onGrip || e.pointerType==="mouse";
  press={ task, block:el, pointerId:e.pointerId, startX:e.clientX, startY:e.clientY,
          moved:false, dragging:false, eligible };
  if(eligible){ try{ el.setPointerCapture(e.pointerId); }catch(_){ } }
  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp);
  window.addEventListener("pointercancel", onPointerCancel);
}
function onPointerMove(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(!press.moved && Math.hypot(e.clientX-press.startX, e.clientY-press.startY)>6) press.moved=true;
  if(press.dragging){ e.preventDefault(); dragMoveTo(e.clientY); return; }
  if(press.eligible && press.moved) startDrag(e);
}
function onPointerUp(e){
  if(!press || e.pointerId!==press.pointerId) return;
  const wasTap = !press.dragging && !press.moved;
  const tapId = press.task.id;
  if(press.dragging) commitDrag();
  cleanupPress();
  if(wasTap) openEditor(tapId);
}
function onPointerCancel(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(press.dragging){
    stopAutoScroll();
    if(press.origStart!=null) press.task.start=press.origStart; // откат времени
    press.block.classList.remove("dragging");
    document.body.classList.remove("dragging-active");
    renderTimeline();
  }
  cleanupPress();
}
function cleanupPress(){
  window.removeEventListener("pointermove", onPointerMove);
  window.removeEventListener("pointerup", onPointerUp);
  window.removeEventListener("pointercancel", onPointerCancel);
  if(press){ try{ press.block.releasePointerCapture(press.pointerId); }catch(_){ } }
  press=null;
}
function startDrag(e){
  press.dragging=true;
  try{ press.block.setPointerCapture(e.pointerId); }catch(_){ }
  press.vs=viewStart();
  press.origStart=press.task.start;
  press.map={}; timelineEl.querySelectorAll(".block").forEach(b=>press.map[b.dataset.id]=b);
  press.grabOffset = e.clientY - press.block.getBoundingClientRect().top;
  press.block.classList.add("dragging");
  document.body.classList.add("dragging-active");
  startAutoScroll();
  dragMoveTo(e.clientY);
}
function dragMoveTo(clientY){
  press.lastY=clientY;
  const trect=timelineEl.getBoundingClientRect();
  const vs=press.vs;
  const topPx=(clientY-trect.top)-press.grabOffset;
  const start=clampStart(vs+topPx);            // время старта по позиции пальца (кратно 5)
  press.task.start=start;                       // временно двигаем якорь
  const map=placeAnchored(curTasks(), press.task);
  for(const [t,s] of map){
    const el=press.map[t.id]; if(!el) continue;
    el.style.top=(s-vs)+"px";
    el.querySelector(".b-time").textContent=fmtTime(s);
  }
}
function commitDrag(){
  stopAutoScroll();
  normalize(press.task);                         // зафиксировать и убрать наложения
  press.block.classList.remove("dragging");
  document.body.classList.remove("dragging-active");
  saveSoon();
  renderTimeline();
}
/* авто-скролл у краёв */
function startAutoScroll(){ if(!press.raf) press.raf=requestAnimationFrame(autoTick); }
function stopAutoScroll(){ if(press&&press.raf){ cancelAnimationFrame(press.raf); press.raf=null; } }
function autoTick(){
  if(!press||!press.dragging){ return; }
  const r=scrollEl.getBoundingClientRect(), y=press.lastY, EDGE=56; let v=0;
  if(y<r.top+EDGE) v=-Math.ceil((r.top+EDGE-y)/4);
  else if(y>r.bottom-EDGE) v=Math.ceil((y-(r.bottom-EDGE))/4);
  if(v){ const b=scrollEl.scrollTop; scrollEl.scrollTop+=v; if(scrollEl.scrollTop!==b) dragMoveTo(press.lastY); }
  press.raf=requestAnimationFrame(autoTick);
}

/* ===================== РЕСАЙЗ (нижний край) ===================== */
function startResize(e, task, el){
  if(press||resizing) return;
  e.preventDefault();
  resizing={ task, el, pointerId:e.pointerId };
  try{ el.setPointerCapture(e.pointerId); }catch(_){ }
  timelineEl.classList.add("resizing");
  document.body.classList.add("dragging-active");
  window.addEventListener("pointermove", onResizeMove);
  window.addEventListener("pointerup", onResizeUp);
  window.addEventListener("pointercancel", onResizeUp);
}
function onResizeMove(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  e.preventDefault();
  const top=resizing.el.getBoundingClientRect().top;
  const dur=clamp(roundTo5(e.clientY-top), 10, 24*60);
  if(dur===resizing.task.dur) return;
  resizing.task.dur=dur;
  const vs=viewStart();
  const map=placeAnchored(curTasks(), resizing.task); // тянем низ -> нижние блоки раздвигаются
  let ve=winEndMin(); for(const [t,s] of map) ve=Math.max(ve, s+t.dur);
  timelineEl.style.height=Math.max(ve-vs, 120)+"px";
  for(const [t,s] of map){
    const b=timelineEl.querySelector('.block[data-id="'+t.id+'"]');
    if(!b) continue;
    b.style.top=(s-vs)+"px"; b.style.height=visH(t.dur)+"px";
    b.querySelector(".b-time").textContent=fmtTime(s);
    if(t===resizing.task) b.querySelector(".b-dur").textContent=fmtDur(t.dur);
  }
  renderSummary();
}
function onResizeUp(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  timelineEl.classList.remove("resizing");
  document.body.classList.remove("dragging-active");
  window.removeEventListener("pointermove", onResizeMove);
  window.removeEventListener("pointerup", onResizeUp);
  window.removeEventListener("pointercancel", onResizeUp);
  try{ resizing.el.releasePointerCapture(resizing.pointerId); }catch(_){ }
  normalize(resizing.task);
  resizing=null;
  saveSoon();
  renderTimeline();
}

/* ===================== РЕДАКТОР ===================== */
const editingTask = () => curTasks().find(t=>t.id===editingId);
function buildChips(task){
  edChips.innerHTML="";
  for(const k in CATS){
    const c=document.createElement("button");
    c.className="chip"+(k===task.cat?" on":"");
    c.style.setProperty("--cat", CATS[k].color);
    c.textContent=CATS[k].label;
    c.onclick=()=>{ const t=editingTask(); if(!t) return; t.cat=k; syncGroup(t); buildChips(t); renderTimeline(); saveSoon(); };
    edChips.appendChild(c);
  }
}
function buildDayChips(task){
  edDays.innerHTML="";
  const mk=(label,on,cur,fn)=>{ const c=document.createElement("button");
    c.className="chip daychip"+(on?" on":"")+(cur?" cur":""); c.textContent=label; c.onclick=fn; return c; };
  // быстрая кнопка «Все дни»
  edDays.appendChild(mk("Все дни", false, false, ()=>{
    for(const [k] of DAYS){ if(k===currentDay) continue;
      if(!state.days[k].tasks.some(t=>t.gid===task.gid)){ state.days[k].tasks.push({...task, id:uid()}); normalizeDay(k); } }
    buildDayChips(task); renderTimeline(); saveSoon();
  }));
  for(const [k,l] of DAYS){
    const has=state.days[k].tasks.some(t=>t.gid===task.gid);
    edDays.appendChild(mk(l, has, k===currentDay, ()=>{
      if(k===currentDay) return;                 // текущий день не трогаем (для него — кнопка «Удалить»)
      if(state.days[k].tasks.some(t=>t.gid===task.gid))
        state.days[k].tasks=state.days[k].tasks.filter(t=>t.gid!==task.gid);
      else { state.days[k].tasks.push({...task, id:uid()}); normalizeDay(k); }
      buildDayChips(task); renderTimeline(); saveSoon();
    }));
  }
}
function openEditor(id){
  const task=curTasks().find(t=>t.id===id); if(!task) return;
  editingId=id;
  edName.value=task.name;
  buildChips(task);
  buildDayChips(task);
  edDur.textContent=fmtDur(task.dur);
  edStart.value=fmtTime(task.start);
  editorOverlay.hidden=false;
}
function closeEditor(){ editorOverlay.hidden=true; editingId=null; }

edName.addEventListener("input", ()=>{ const t=editingTask(); if(!t) return; t.name=edName.value; syncGroup(t); renderTimeline(); saveSoon(); });
document.querySelector(".stepper").addEventListener("click", e=>{
  const b=e.target.closest("button[data-d]"); if(!b) return;
  const t=editingTask(); if(!t) return;
  t.dur=clamp(t.dur+(+b.dataset.d), 10, 24*60);
  normalize(t);                                  // нижние блоки раздвигаются
  syncGroup(t);                                  // применить на все дни группы
  edDur.textContent=fmtDur(t.dur); renderTimeline(); saveSoon();
});
edStart.addEventListener("change", ()=>{        // задать время начала — блок переезжает туда
  const t=editingTask(); if(!t) return;
  if(/^\d{1,2}:\d{2}$/.test(edStart.value)){
    t.start=clampStart(parseTime(edStart.value));
    normalize(t);                                // соседние раздвигаются, без наложений
    syncGroup(t);                                // то же время на всех днях группы
    edStart.value=fmtTime(t.start);
    renderTimeline(); saveSoon();
  }
});
$("edDelete").addEventListener("click", ()=>{
  const i=curTasks().findIndex(t=>t.id===editingId);
  if(i>=0) curTasks().splice(i,1);
  closeEditor(); renderTimeline(); saveSoon();
});
$("edDeleteAll").addEventListener("click", ()=>{          // удалить эту задачу со всех дней (по gid)
  const t=editingTask(); if(!t) return;
  const gid=t.gid;
  for(const [k] of DAYS) state.days[k].tasks=state.days[k].tasks.filter(x=>x.gid!==gid);
  closeEditor(); renderTimeline(); saveSoon();
});
$("edDone").addEventListener("click", closeEditor);
$("edClose").addEventListener("click", closeEditor);
editorOverlay.addEventListener("click", e=>{ if(e.target===editorOverlay) closeEditor(); });

/* ===================== ПАНЕЛЬ ИНСТРУМЕНТОВ ===================== */
function addTaskAt(startMin){
  const dur=60;
  const t={ id:uid(), gid:uid(), name:"Новая задача", cat:"free", dur, start:clampStart(startMin) };
  curTasks().push(t); normalize(t);              // встанет на это время, соседи раздвинутся
  renderTimeline(); saveSoon();
  openEditor(t.id);
}
$("addBtn").addEventListener("click", ()=>{
  addTaskAt(layoutCurrent().endMin);             // по умолчанию — в конец дня
  scrollEl.scrollTop=scrollEl.scrollHeight;
});
dayStartInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayStartInput.value)){ curDay().start=dayStartInput.value; renderTimeline(); saveSoon(); }
});
dayEndInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayEndInput.value)){ state.settings.dayEnd=dayEndInput.value; renderTimeline(); saveSoon(); }
});

/* undo / redo: кнопки + клавиатура */
$("undoBtn").addEventListener("click", ()=>History.undo());
$("redoBtn").addEventListener("click", ()=>History.redo());
window.addEventListener("keydown", (e)=>{
  if(!(e.ctrlKey||e.metaKey)) return;
  const tag=(e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;   // не мешаем нативному undo в полях
  if(press||resizing) return;                    // не дёргать во время драга/ресайза
  const k=e.key.toLowerCase();
  if(k==="z" && !e.shiftKey){ e.preventDefault(); History.undo(); }
  else if(k==="y" || (k==="z" && e.shiftKey)){ e.preventDefault(); History.redo(); }
});
$("resetBtn").addEventListener("click", ()=>{
  if(!confirm("Сбросить все дни к стартовому шаблону?")) return;
  state=template(); Storage.save(state);
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  renderAll(); Cloud.pushSoon(); History.record(); toast("Сброшено к шаблону");
});
themeBtn.addEventListener("click", ()=>{
  state.settings.theme = state.settings.theme==="dark" ? "light" : "dark";
  applyTheme(); saveSoon();
});
function applyTheme(){
  const dark=state.settings.theme==="dark";
  document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  themeBtn.textContent = dark ? "☀️" : "🌙";
}

/* экспорт: скачать JSON + скопировать в буфер */
$("exportBtn").addEventListener("click", ()=>{
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="planner-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(json).then(()=>toast("Скачано и скопировано"),()=>toast("Файл скачан"));
  else toast("Файл скачан");
});
/* импорт */
$("importBtn").addEventListener("click", ()=>{ imText.value=""; imErr.textContent=""; importOverlay.hidden=false; });
$("imClose").addEventListener("click", ()=>importOverlay.hidden=true);
importOverlay.addEventListener("click", e=>{ if(e.target===importOverlay) importOverlay.hidden=true; });
$("imLoad").addEventListener("click", ()=>{
  try{
    const norm=validateState(JSON.parse(imText.value));
    state=norm; Storage.save(state);
    if(!state.days[currentDay]) currentDay="mon";
    importOverlay.hidden=true; renderAll(); Cloud.pushSoon(); History.record(); toast("Импортировано");
  }catch(err){ imErr.textContent="Ошибка: "+(err.message||err); }
});
/* копирование дня */
$("copyBtn").addEventListener("click", ()=>{
  copyDays.innerHTML="";
  for(const [k,l] of DAYS){
    if(k===currentDay) continue;
    const b=document.createElement("button");
    b.textContent=l+(k===TODAY_KEY?" •":"");
    b.onclick=()=>{
      state.days[k].tasks=curTasks().map(t=>({...t,id:uid()}));
      state.days[k].start=curDay().start;
      Storage.save(state); Cloud.pushSoon(); History.record(); copyOverlay.hidden=true; toast("Скопировано в «"+l+"»");
      if(k===currentDay) renderTimeline();
    };
    copyDays.appendChild(b);
  }
  copyOverlay.hidden=false;
});
$("cpClose").addEventListener("click", ()=>copyOverlay.hidden=true);
copyOverlay.addEventListener("click", e=>{ if(e.target===copyOverlay) copyOverlay.hidden=true; });

/* тост */
let _toastTimer=null;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show");
  if(_toastTimer) clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1800); }

/* ===================== СТАРТ ===================== */
function init(){
  const loaded=Storage.load();
  if(loaded){ try{ state=validateState(loaded); }catch(e){ state=template(); } }
  else state=template();
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  applyTheme();
  const now=new Date();
  if(brandSubEl) brandSubEl.textContent = MONTHS[now.getMonth()]+" · неделя "+isoWeek(now);
  renderTabs();
  dayStartInput.value=curDay().start;
  dayEndInput.value=(state.settings.dayEnd)||"22:00";
  renderTimeline();
  History.init();                      // базовый снимок для undo/redo
  setInterval(positionNowLine, 30000); // линия «сейчас» — раз в 30с
  Cloud.init();                        // подключаем облако поверх локального режима
}
init();
</script>
</body>
