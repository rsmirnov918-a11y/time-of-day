<style>
/* ===================== –Ґ–Х–Ь–Р / –Я–Х–†–Х–Ь–Х–Э–Э–Ђ–Х ===================== */
:root{
  --surface:#ffffff; --surface2:#eef1f6; --panel:#ffffff;
  --text:#1b2330; --muted:#6b7585; --line:#e2e7ee;
  --grid:#eef1f5; --grid2:#d7dde6;
  --now:#e0485a; --accent:#2f80ed;
  --shadow:0 8px 26px rgba(20,30,50,.14);
}
[data-theme="dark"]{
  --surface:#161b24; --surface2:#0c0f15; --panel:#1b212d;
  --text:#e7ebf2; --muted:#98a2b3; --line:#283040;
  --grid:#1a212c; --grid2:#2b3343;
  --now:#ff6b7a; --accent:#5b9dff;
  --shadow:0 10px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--surface2); color:var(--text);
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
body.dragging-active{ user-select:none; -webkit-user-select:none; cursor:grabbing; }

button,input,textarea{font:inherit;color:inherit}
button{cursor:pointer}

/* ===================== –®–Р–Я–Ъ–Р ===================== */
header{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line);
}
.brand{font-weight:700; font-size:16px; margin-right:auto; white-space:nowrap}
.tools{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.tools .start{display:flex; align-items:center; gap:4px; font-size:13px; color:var(--muted)}
.tools input[type=time]{
  background:var(--surface); border:1px solid var(--line); color:var(--text);
  border-radius:8px; padding:4px 6px;
}
.tools button{
  background:var(--surface); border:1px solid var(--line); color:var(--text);
  border-radius:8px; padding:6px 10px; font-size:13px;
}
.tools button:hover{border-color:var(--accent)}
.tools button.primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600}
.tools button.icon{ font-size:16px; line-height:1; padding:6px 9px; }
.tools button:disabled{ opacity:.35; cursor:default; }
.tools button:disabled:hover{ border-color:var(--line); }

/* –±–ї–Њ–Ї –∞—Г—В–µ–љ—В–Є—Д–Є–Ї–∞—Ж–Є–Є */
.auth{ display:flex; align-items:center; gap:8px; }
.auth .avatar{ width:26px; height:26px; border-radius:50%; object-fit:cover; border:1px solid var(--line); }
.auth .uemail{ font-size:12px; color:var(--muted); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth button{ background:var(--surface); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 10px; font-size:13px; }
.auth button.primary{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

/* ===================== –Т–Ъ–Ы–Р–Ф–Ъ–Ш –Ф–Э–Х–Щ ===================== */
.tabs{
  display:flex; gap:4px; padding:8px 12px; background:var(--panel);
  border-bottom:1px solid var(--line); overflow-x:auto;
}
.tab{
  flex:1 0 auto; min-width:44px; text-align:center;
  background:var(--surface); border:1px solid var(--line); color:var(--muted);
  border-radius:9px; padding:7px 6px; font-size:13px; font-weight:600;
}
.tab.today{ box-shadow:inset 0 -2px 0 var(--now); }
.tab.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

/* ===================== –°–Т–Ю–Ф–Ъ–Р ===================== */
.summary{ padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
.s-line{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.s-range{ font-weight:700; font-variant-numeric:tabular-nums; margin-right:4px; }
.s-chip{
  font-size:12px; padding:2px 8px; border-radius:999px; white-space:nowrap;
  background:color-mix(in srgb, var(--cat) 16%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 45%, var(--surface));
  color:color-mix(in srgb, var(--cat) 75%, var(--text));
}
.s-week{ margin-top:6px; font-size:12px; color:var(--muted); }

/* ===================== –Ґ–Р–Щ–Ь–Ы–Р–Щ–Э ===================== */
.timeline-scroll{
  flex:1; overflow-y:auto; overflow-x:hidden;
  touch-action:pan-y; padding:10px 10px 60px;
}
.timeline{
  position:relative; max-width:680px; margin:0 auto;
  background-image:linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size:100% 60px;
}
.block{
  position:absolute; left:0; right:0; box-sizing:border-box;
  border-radius:9px; padding:3px 8px 3px 26px; overflow:hidden;
  transition:top .18s cubic-bezier(.2,.7,.3,1);
  background:color-mix(in srgb, var(--cat) 16%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 48%, var(--surface));
  color:color-mix(in srgb, var(--cat) 78%, var(--text));
  touch-action:pan-y; user-select:none; -webkit-user-select:none;
}
.timeline.resizing .block{ transition:none; }
.block.dragging{
  transition:none; z-index:30; cursor:grabbing; opacity:.98;
  box-shadow:var(--shadow); transform:scale(1.015);
  border-color:color-mix(in srgb, var(--cat) 70%, var(--surface));
}
.cat-free{ border-style:dashed; }
.block[data-pinned="1"] .b-time::before{ content:"рЯУМ "; }

.grip{
  position:absolute; left:0; top:0; bottom:0; width:22px;
  display:flex; align-items:center; justify-content:center;
  color:color-mix(in srgb, var(--cat) 60%, var(--text)); opacity:.65;
  cursor:grab; touch-action:none; font-size:13px; letter-spacing:-2px;
}
.grip:active{cursor:grabbing}
.resize-handle{
  position:absolute; left:0; right:0; bottom:0; height:13px;
  cursor:ns-resize; touch-action:none;
}
.resize-handle::after{
  content:""; position:absolute; left:50%; bottom:3px; transform:translateX(-50%);
  width:36px; height:3px; border-radius:3px;
  background:color-mix(in srgb, var(--cat) 55%, var(--surface)); opacity:.55;
}
.b-top{ display:flex; gap:6px; align-items:baseline; line-height:1.15; }
.b-time{ font-variant-numeric:tabular-nums; font-weight:700; font-size:12px; opacity:.85; }
.b-name{ font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.b-meta{ display:flex; gap:8px; font-size:11px; opacity:.78; margin-top:1px; }
/* –Ї–Њ—А–Њ—В–Ї–Є–µ –±–ї–Њ–Ї–Є: —Г–±–Є—А–∞–µ–Љ —А–µ—Б–∞–є–Ј-–њ–Њ–ї–Њ—Б—Г (–Њ–љ–∞ –њ–µ—А–µ–Ї—А—Л–≤–∞–ї–∞ –≤–µ—Б—М –±–ї–Њ–Ї) –Є –≤—В–Њ—А–Њ–є —А—П–і,
   —З—В–Њ–±—Л —В–∞–њ –Њ—В–Ї—А—Л–≤–∞–ї —А–µ–і–∞–Ї—В–Њ—А вАФ –і–ї–Є—В–µ–ї—М–љ–Њ—Б—В—М –Љ–µ–љ—П–µ—В—Б—П —Б—В–µ–њ–њ–µ—А–∞–Љ–Є ¬±5/¬±15 */
.block.short{ padding-top:1px; padding-bottom:1px; }
.block.short .resize-handle{ display:none; }
.block.short .b-meta{ display:none; }
.block.short .b-top{ font-size:11px; }

.gap, .tail{
  position:absolute; left:0; right:0; box-sizing:border-box;
  border:1px dashed var(--grid2); border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--muted); pointer-events:none; overflow:hidden;
}
.tail{ opacity:.55; }                       /* –њ—Г—Б—В–Њ–є ¬Ђ—Е–≤–Њ—Б—В¬ї —В—А–µ–Ї–∞ –і–Њ –Ї–Њ–љ—Ж–∞ –Њ–Ї–љ–∞ */
.timeline.resizing .tail{ display:none; }   /* –љ–µ –Љ–Є–≥–∞—В—М –≤–Њ –≤—А–µ–Љ—П —А–µ—Б–∞–є–Ј–∞ */
.now-line{
  position:absolute; left:0; right:0; height:0; z-index:20;
  border-top:2px solid var(--now); pointer-events:none;
}
.now-line span{
  position:absolute; left:2px; top:-9px; background:var(--now); color:#fff;
  font-size:10px; font-weight:700; padding:0 5px; border-radius:7px;
}

/* ===================== –Ь–Ю–Ф–Р–Ы–Ъ–Ш ===================== */
.overlay{
  position:fixed; inset:0; background:rgba(10,15,25,.45);
  display:flex; align-items:flex-end; justify-content:center; z-index:100;
}
.overlay[hidden]{display:none}
.sheet{
  width:100%; max-width:480px; background:var(--panel); color:var(--text);
  border-radius:16px 16px 0 0; padding:16px; box-shadow:var(--shadow);
  max-height:88vh; overflow:auto;
}
@media(min-width:560px){
  .overlay{align-items:center}
  .sheet{border-radius:16px}
}
.sheet-head{ display:flex; align-items:center; margin-bottom:12px; }
.sheet-head h3{ margin:0; font-size:17px; }
.sheet-head .x{ margin-left:auto; background:none; border:none; font-size:18px; color:var(--muted); }
.fld{ display:block; margin-bottom:14px; }
.fld>span{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
.fld.row{ display:flex; align-items:center; justify-content:space-between; }
.fld.row>span{ margin:0; }
.sheet input[type=text], .sheet input[type=time], .sheet textarea{
  width:100%; background:var(--surface); border:1px solid var(--line);
  color:var(--text); border-radius:9px; padding:9px 10px;
}
.sheet textarea{ resize:vertical; font-family:ui-monospace,Consolas,monospace; font-size:12px; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{

  background:color-mix(in srgb, var(--cat) 14%, var(--surface));
  border:1px solid color-mix(in srgb, var(--cat) 40%, var(--surface));
  color:color-mix(in srgb, var(--cat) 78%, var(--text));
}

  border-color:color-mix(in srgb, var(--cat) 80%, var(--surface)); }
.stepper{ display:flex; align-items:center; gap:8px; }
.stepper button{

.sheet-actions{ display:flex; gap:8px; margin-top:6px; }

.copy-days{ display:flex; flex-wrap:wrap; gap:8px; }

.im-err{ color:#e0485a; font-size:12px; min-height:16px; margin:-6px 0 10px; }

/* ===================== –Ґ–Ю–°–Ґ ===================== */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);

  font-size:13px; font-weight:600; opacity:0; transition:.2s; z-index:200; pointer-events:none;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const deepClone = o => JSON.parse(JSON.stringify(o));
const roundTo5 = m => Math.round(m/5)*5;
let _uid = 0;
function uid(){ _uid++; return "t"+Date.now().toString(36)+"_"+_uid.toString(36); }
function parseTime(s){ const m=/^(\d{1,2}):(\d{2})$/.exec(String(s||"")); if(!m) return 420; return (+m[1])*60+(+m[2]); }
function fmtTime(min){ min=Math.round(min); min=((min%1440)+1440)%1440; const h=Math.floor(min/60), m=min%60; return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); }
function fmtDur(min){ const h=Math.floor(min/60), m=min%60; if(h&&m) return h+"—З "+m+"–Љ"; if(h) return h+"—З"; return m+"–Љ"; }

/* ===================== –•–†–Р–Э–Ш–Ы–Ш–©–Х (–Є–Ј–Њ–ї–Є—А–Њ–≤–∞–љ–љ—Л–є –Љ–Њ–і—Г–ї—М) =====================
   load/save –≤—Л–љ–µ—Б–µ–љ—Л —Б—О–і–∞, —З—В–Њ–±—Л –њ–Њ–Ј–ґ–µ –Ј–∞–Љ–µ–љ–Є—В—М localStorage –љ–∞ Firebase Firestore,
   –љ–µ —В—А–Њ–≥–∞—П –Њ—Б—В–∞–ї—М–љ—Г—О –ї–Њ–≥–Є–Ї—Г. */
const Storage = (() => {
  const KEY = "dayPlanner.v1";
  return {
    load(){ try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } },
    save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} },
  };
})();
let _saveTimer=null;
function saveSoon(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>Storage.save(state),250); // –Њ—Д—Д–ї–∞–є–љ-–Ї—Н—И
  Cloud.pushSoon();                                   // –Њ–±–ї–∞–Ї–Њ (–µ—Б–ї–Є –≤–Њ—И—С–ї)
  History.record();                                   // —И–∞–≥ –Є—Б—В–Њ—А–Є–Є (undo/redo)
}

/* ===================== –Ю–С–Ы–Р–Ъ–Ю (Firebase Firestore + Auth) =====================
   –Ґ–Њ—В –ґ–µ –Ї–Њ–љ—В—А–∞–Ї—В, —З—В–Њ —Г Storage: –≥—А—Г–Ј–Є–Љ/–њ–Є—И–µ–Љ –Т–Х–°–ђ –Њ–±—К–µ–Ї—В state.
   - –љ–µ –≤–Њ—И—С–ї  -> –љ–Є—З–µ–≥–Њ –љ–µ –і–µ–ї–∞–µ–Љ, —А–∞–±–Њ—В–∞–µ—В —В–Њ–ї—М–Ї–Њ localStorage;
   - –≤–Њ—И—С–ї     -> –њ–Њ–і–њ–Є—Б–Ї–∞ onSnapshot (–ґ–Є–≤–Њ–є —Б–Є–љ–Ї) + setDoc —Б debounce;
   - –Ј–∞—Й–Є—В–∞ –Њ—В —Н—Е–∞: –љ–µ –њ–Є—И–µ–Љ –Њ–±—А–∞—В–љ–Њ –Є–Ј–Љ–µ–љ–µ–љ–Є–µ, –њ—А–Є–ї–µ—В–µ–≤—И–µ–µ –Є–Ј onSnapshot. */
const Cloud = (() => {
  let auth=null, db=null, user=null, unsub=null, ready=false;
  let timer=null, applyingRemote=false, lastSyncedJSON=null;

  function init(){
    try{
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      ready = true;
    }catch(e){ ready=false; renderAuthUI(); return; }
    // –Њ—Д—Д–ї–∞–є–љ-–њ–µ—А—Б–Є—Б—В–µ–љ—В–љ–Њ—Б—В—М (–Љ–Њ–ї—З–∞, –µ—Б–ї–Є –љ–µ –њ–Њ–і–і–µ—А–ґ–Є–≤–∞–µ—В—Б—П)
    try{ enableIndexedDbPersistence(db).catch(()=>{}); }catch(e){}
    onAuthStateChanged(auth, onAuth);
    renderAuthUI();
  }

  function onAuth(u){
    user = u || null;
    renderAuthUI();
    if(unsub){ unsub(); unsub=null; }
    lastSyncedJSON = null;
    if(!user) return; // –≤—Л—И–µ–ї -> —Б–љ–Њ–≤–∞ —З–Є—Б—В–Њ –ї–Њ–Ї–∞–ї—М–љ—Л–є —А–µ–ґ–Є–Љ
    const ref = doc(db, "schedules", user.uid);
    unsub = onSnapshot(ref, { includeMetadataChanges:true },
      (snap) => {
        if(!snap.exists()){
          // –њ–Њ–Ї–∞ –Њ—В–≤–µ—В —В–Њ–ї—М–Ї–Њ –Є–Ј –Ї—Н—И–∞ вАФ –Э–Х –Ј–∞—В–Є—А–∞–µ–Љ –≤–Њ–Ј–Љ–Њ–ґ–љ—Л–µ –і–∞–љ–љ—Л–µ –≤ –Њ–±–ї–∞–Ї–µ (–≤–∞–ґ–љ–Њ –і–ї—П –≤—В–Њ—А–Њ–≥–Њ —Г—Б—В—А–Њ–є—Б—В–≤–∞)
          if(snap.metadata && snap.metadata.fromCache) return;
          // —Б–µ—А–≤–µ—А –њ–Њ–і—В–≤–µ—А–і–Є–ї, —З—В–Њ –і–Њ–Ї—Г–Љ–µ–љ—В–∞ –љ–µ—В -> –њ–µ—А–≤–Є—З–љ–∞—П –Љ–Є–≥—А–∞—Ж–Є—П –ї–Њ–Ї–∞–ї—М–љ—Л—Е –і–∞–љ–љ—Л—Е
          pushNow();
          return;
        }
        const data = snap.data();
        if(!data || !data.state) return;
        const json = JSON.stringify(data.state);
        if(json === lastSyncedJSON) return;        // —Н—В–Њ –љ–∞—И –ґ–µ —Н—Е–Њ-—Б–љ–Є–Љ–Њ–Ї
        if(json === JSON.stringify(state)) { lastSyncedJSON = json; return; }
        lastSyncedJSON = json;
        applyRemote(data.state);                    // –Њ–±–ї–∞–Ї–Њ вАФ –Є—Б—В–Њ—З–љ–Є–Ї –њ—А–∞–≤–і—Л
      },
      (err) => { toast("вЪ† –љ–µ—В —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є–Є"); }
    );
  }

  function applyRemote(remoteState){
    let norm;
    try{ norm = validateState(remoteState); }catch(e){ return; }
    applyingRemote = true;
    state = norm;
    Storage.save(state);                            // –Њ–±–љ–Њ–≤–ї—П–µ–Љ –Њ—Д—Д–ї–∞–є–љ-–Ї—Н—И
    if(!state.days[currentDay]) currentDay = "mon";
    renderAll();
    History.reset();                                // –њ—А–Є–ї–µ—В–µ–ї–Њ –Є–Ј –Њ–±–ї–∞–Ї–∞ вАФ –Є—Б—В–Њ—А–Є—О –Њ–±–љ—Г–ї—П–µ–Љ
    applyingRemote = false;
  }

  function pushSoon(){
    if(!ready || !user || applyingRemote) return;
    if(timer) clearTimeout(timer);
    timer = setTimeout(pushNow, 600);
  }

  async function pushNow(){
    if(!ready || !user) return;
    try{
      const json = JSON.stringify(state);
      lastSyncedJSON = json;                         // –њ–Њ–Љ–µ—З–∞–µ–Љ, —З—В–Њ–±—Л –Є–≥–љ–Њ—А–Є—А–Њ–≤–∞—В—М —Б–≤–Њ–є —Н—Е–Њ-—Б–љ–Є–Љ–Њ–Ї
      await setDoc(doc(db,"schedules",user.uid),
                   { state, updatedAt: serverTimestamp() }, { merge:true });
    }catch(e){ toast("вЪ† –Њ—Д–ї–∞–є–љ / –љ–µ—В —Б–Є–љ–Ї–∞"); }
  }

  async function login(){
    if(!ready){ toast("Firebase –љ–µ–і–Њ—Б—В—Г–њ–µ–љ"); return; }
    try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e){ if(e && e.code!=="auth/popup-closed-by-user") toast("–Э–µ —Г–і–∞–ї–Њ—Б—М –≤–Њ–є—В–Є"); }
  }
  async function logout(){ try{ await signOut(auth); }catch(e){} }

  return { init, login, logout, pushSoon, get user(){ return user; }, get ready(){ return ready; } };
})();

/* –Ї–љ–Њ–њ–Ї–∞ –≤—Е–Њ–і–∞ / –њ—А–Њ—Д–Є–ї—М –≤ —И–∞–њ–Ї–µ */

/* ===================== –Ш–°–Ґ–Ю–†–Ш–ѓ (undo / redo) =====================
   –°–љ–Є–Љ–Ї–Є –≤—Б–µ–≥–Њ state. –С—Л—Б—В—А—Л–µ –њ—А–∞–≤–Ї–Є –Ї–Њ–∞–ї–µ—Б—П—В—Б—П –њ–Њ –њ–∞—Г–Ј–µ (–Њ–і–Є–љ —И–∞–≥ –Є—Б—В–Њ—А–Є–Є).
   record() –і—С—А–≥–∞–µ—В—Б—П –љ–∞ –Ї–∞–ґ–і–Њ–µ –ї–Њ–Ї–∞–ї—М–љ–Њ–µ –Є–Ј–Љ–µ–љ–µ–љ–Є–µ (–Є–Ј saveSoon). */
const History = (() => {
  let undo=[], redo=[], baseline="null", timer=null;
  const MAX=120;
  const snap=()=>JSON.stringify(state);
  function init(){ baseline=snap(); undo=[]; redo=[]; updateButtons(); }
  function reset(){ init(); }                 // –њ–Њ—Б–ї–µ –њ—А–Є—Е–Њ–і–∞ –Є–Ј –Њ–±–ї–∞–Ї–∞ вАФ –Є—Б—В–Њ—А–Є—О –Њ–±–љ—Г–ї—П–µ–Љ
  function record(){                          // –Є–Ј–Љ–µ–љ–µ–љ–Є–µ: –Ј–∞–њ–ї–∞–љ–Є—А–Њ–≤–∞—В—М –Ї–Њ–Љ–Љ–Є—В —Б –Ї–Њ–∞–ї–µ—Б–Є–љ–≥–Њ–Љ
    if(timer) clearTimeout(timer);
    timer=setTimeout(commit, 350);
    updateButtons();
  }
  function commit(){
    timer=null;
    const cur=snap();
    if(cur===baseline) return;
    undo.push(baseline); if(undo.length>MAX) undo.shift();
    redo=[]; baseline=cur; updateButtons();
  }
  function flush(){ if(timer){ clearTimeout(timer); timer=null; } commit(); }
  function apply(json){
    state=JSON.parse(json);
    if(!state.days[currentDay]) currentDay="mon";
    baseline=json;
    Storage.save(state); Cloud.pushSoon();    // –њ—А–Є–Љ–µ–љ—С–љ–љ–Њ–µ —Б–Њ—Б—В–Њ—П–љ–Є–µ —В–Њ–ґ–µ –Ї—Н—И–Є—А—Г–µ–Љ –Є —Б–Є–љ–Ї–∞–µ–Љ
    renderAll(); updateButtons();
  }
  function undoOp(){
    flush();
    if(!undo.length) return;
    redo.push(baseline);
    apply(undo.pop());
    toast("–Ю—В–Љ–µ–љ–µ–љ–Њ");
  }
  function redoOp(){
    flush();
    if(!redo.length) return;
    undo.push(baseline);
    apply(redo.pop());
    toast("–Т–Њ–Ј–≤—А–∞—Й–µ–љ–Њ");
  }
  function updateButtons(){
    const ub=document.getElementById("undoBtn"), rb=document.getElementById("redoBtn");
    if(!ub) return;
    const pending = snap()!==baseline;
    ub.disabled = !(undo.length>0 || pending);
    rb.disabled = redo.length===0;
  }
  return { init, reset, record, undo:undoOp, redo:redoOp };
})();

/* ===================== –°–Ю–°–Ґ–Ю–ѓ–Э–Ш–Х ===================== */
function template(){
  const days={};
  for(const [k] of DAYS){
    days[k]={ start:"06:00", tasks: SEED[k].map(a=>({id:uid(), name:a[0], cat:a[1], dur:a[2], fixedStart:null})) };
  }
  return { version:1, settings:{theme:"light", dayEnd:"22:00"}, days };
}
function normTask(t){
  return {
    id: t && t.id ? String(t.id) : uid(),
    name: String((t&&t.name) ?? "–Ч–∞–і–∞—З–∞"),
    cat: (t && CATS[t.cat]) ? t.cat : "free",
    dur: clamp(roundTo5(+( (t&&t.dur) || 60)), 10, 24*60),
    fixedStart: (t && t.fixedStart!=null && isFinite(t.fixedStart)) ? clamp(roundTo5(+t.fixedStart),0,24*60) : null,
  };
}
function validateState(obj){
  if(!obj || typeof obj!=="object") throw new Error("–љ–µ –Њ–±—К–µ–Ї—В");
  if(!obj.days || typeof obj.days!=="object") throw new Error("–љ–µ—В –њ–Њ–ї—П days");
  const _s=obj.settings||{};
  const out={ version:1, settings:{
    theme:(_s.theme==="dark")?"dark":"light",
    dayEnd:/^\d{1,2}:\d{2}$/.test(_s.dayEnd)?_s.dayEnd:"22:00"
  }, days:{} };
  for(const [k] of DAYS){
    const d=obj.days[k];
    if(!d || !Array.isArray(d.tasks)) throw new Error("–і–µ–љ—М "+k+" –њ–Њ–≤—А–µ–ґ–і—С–љ");
    out.days[k]={ start:/^\d{1,2}:\d{2}$/.test(d.start)?d.start:"07:00", tasks:d.tasks.map(normTask) };
  }
  return out;
}

let state, currentDay, editingId=null;

const curDay     = () => state.days[currentDay];
const curTasks   = () => curDay().tasks;
const curStartMin= () => parseTime(curDay().start);
const curEndMin  = () => parseTime((state.settings && state.settings.dayEnd) || "22:00");
const winMin     = () => Math.max(0, curEndMin() - curStartMin());  // –і–ї–Є–љ–∞ —В—А–µ–Ї–∞-–Њ–Ї–љ–∞, –Љ–Є–љ
const BLOCK_GAP=6, BLOCK_VIS_MIN=8;                                  // –Ї–Њ—Б–Љ–µ—В–Є—З–µ—Б–Ї–Є–є –Ј–∞–Ј–Њ—А –Љ–µ–ґ–і—Г –±–ї–Њ–Ї–∞–Љ–Є
const visH = h => Math.max(h - BLOCK_GAP, BLOCK_VIS_MIN);           // –≤–Є–і–Є–Љ–∞—П –≤—Л—Б–Њ—В–∞ (–љ–µ –≤–ї–Є—П–µ—В –љ–∞ –≤—А–µ–Љ—П)

/* ===================== –†–Р–°–Ъ–Ы–Р–Ф–Ъ–Р (–њ–Њ—А—П–і–Њ–Ї -> –њ–Њ–Ј–Є—Ж–Є–Є) =====================
   –Р–±—Б–Њ–ї—О—В–љ–Њ–µ –≤—А–µ–Љ—П –Э–Х —Е—А–∞–љ–Є—В—Б—П вАФ –Њ–љ–Њ –≤—Л—З–Є—Б–ї—П–µ—В—Б—П –Ї–∞–Ї –љ–∞–Ї–Њ–њ–ї–µ–љ–љ–∞—П —Б—Г–Љ–Љ–∞
   –і–ї–Є—В–µ–ї—М–љ–Њ—Б—В–µ–є –Њ—В —Б—В–∞—А—В–∞ –і–љ—П. –Я–Њ—Н—В–Њ–Љ—Г –љ–∞–ї–Њ–ґ–µ–љ–Є—П –љ–µ–≤–Њ–Ј–Љ–Њ–ґ–љ—Л –≤ –њ—А–Є–љ—Ж–Є–њ–µ. */
function computeLayout(tasks, startMin){
  let cursor=startMin, topPx=0;
  const items=[];
  for(const t of tasks){
    let gap=0;
    if(t.fixedStart!=null && t.fixedStart>cursor) gap=t.fixedStart-cursor; // –Ј–∞–Ї—А–µ–њ–ї—С–љ–љ–Њ–µ –≤—А–µ–Љ—П -> –∞–≤—В–Њ-–Ј–∞–Ј–Њ—А
    const gapTop=topPx;
    cursor+=gap; topPx+=gap;
    items.push({ task:t, top:topPx, height:t.dur, startMin:cursor, gapBefore:gap, gapTop });
    cursor+=t.dur; topPx+=t.dur;
  }
  return { items, total:topPx };
}
const layoutCurrent = () => computeLayout(curTasks(), curStartMin());

/* ===================== –†–Х–Э–Ф–Х–† ===================== */
function makeBlock(task){
  const el=document.createElement("div");
  el.className="block cat-"+task.cat;
  el.dataset.id=task.id;
  if(task.fixedStart!=null) el.dataset.pinned="1";
  el.style.setProperty("--cat", CATS[task.cat].color);
  el.innerHTML =
    '<div class="grip">в†њ</div>'+
    '<div class="b-body">'+
      '<div class="b-top"><span class="b-time"></span><span class="b-name"></span></div>'+
      '<div class="b-meta"><span class="b-dur"></span><span class="b-cat"></span></div>'+
    '</div>'+
    '<div class="resize-handle"></div>';
  el.querySelector(".b-name").textContent=task.name;
  el.querySelector(".b-dur").textContent=fmtDur(task.dur);
  el.querySelector(".b-cat").textContent=CATS[task.cat].label;
  el.addEventListener("pointerdown", e=>onPointerDown(e, task, el));
  return el;
}
function positionBlock(el, item){
  el.style.top=item.top+"px";
  el.style.height=visH(item.height)+"px"; // –≤—Л—Б–Њ—В–∞ —Б–ї–Њ—В–∞ = –і–ї–Є—В–µ–ї—М–љ–Њ—Б—В–Є, –≤–Є–і–Є–Љ–∞—П —З—Г—В—М –Љ–µ–љ—М—И–µ (–Ј–∞–Ј–Њ—А)
  el.classList.toggle("short", item.height < 30); // –Ї–Њ—А–Њ—В–Ї–Є–є –±–ї–Њ–Ї -> —В–∞–њ –Њ—В–Ї—А—Л–≤–∞–µ—В —А–µ–і–∞–Ї—В–Њ—А
  el.querySelector(".b-time").textContent=fmtTime(item.startMin);
}
function renderTimeline(){
  timelineEl.querySelectorAll(".block,.gap,.tail").forEach(n=>n.remove());
  const lay=layoutCurrent();
  const win=winMin();
  timelineEl.style.height=Math.max(lay.total, win, 120)+"px"; // —В—А–µ–Ї –≤—Б–µ–≥–і–∞ —В—П–љ–µ—В—Б—П –і–Њ –Ї–Њ–љ—Ж–∞ –Њ–Ї–љ–∞
  timelineEl.style.backgroundPositionY=((60-(curStartMin()%60))%60)+"px";
  if(win>lay.total){ // –Ј–∞–і–∞—З–Є –љ–µ –Ј–∞–њ–Њ–ї–љ–Є–ї–Є –Њ–Ї–љ–Њ -> –њ—Г—Б—В–Њ–є —Е–≤–Њ—Б—В –і–Њ –Ї–Њ–љ—Ж–∞ –і–љ—П
    const tail=document.createElement("div");
    tail.className="tail"; tail.style.top=lay.total+"px"; tail.style.height=(win-lay.total)+"px";
    tail.innerHTML="<span>—Б–≤–Њ–±–Њ–і–љ–Њ –і–Њ "+((state.settings&&state.settings.dayEnd)||"22:00")+"</span>";
    timelineEl.appendChild(tail);
  }
  for(const item of lay.items){
    if(item.gapBefore>0){
      const g=document.createElement("div");
      g.className="gap";
      g.style.top=item.gapTop+"px"; g.style.height=item.gapBefore+"px";
      g.innerHTML="<span>—Б–≤–Њ–±–Њ–і–љ–Њ "+fmtDur(item.gapBefore)+"</span>";
      timelineEl.appendChild(g);
    }
    const el=makeBlock(item.task);
    positionBlock(el,item);
    timelineEl.appendChild(el);
  }
  positionNowLine();
  renderSummary();
}
function renderTabs(){
  tabsEl.innerHTML="";
  for(const [k,l] of DAYS){
    const b=document.createElement("button");
    b.className="tab"+(k===currentDay?" active":"")+(k===TODAY_KEY?" today":"");
    b.textContent=l;
    b.onclick=()=>switchDay(k);
    tabsEl.appendChild(b);
  }
}
function renderSummary(){
  const by={}; let total=0;
  for(const t of curTasks()){ by[t.cat]=(by[t.cat]||0)+t.dur; total+=t.dur; }
  const endMin=curStartMin()+layoutCurrent().total;
  const overDays=Math.floor(endMin/1440);                 // –љ–∞ —Б–Ї–Њ–ї—М–Ї–Њ —Б—Г—В–Њ–Ї –і–µ–љ—М —Г—Е–Њ–і–Є—В –Ј–∞ –њ–Њ–ї–љ–Њ—З—М
  const endLabel=fmtTime(endMin)+(overDays>0?" (+"+overDays+"–і)":"");
  const part=(k,lbl)=> by[k] ? '<span class="s-chip" style="--cat:'+CATS[k].color+'">'+lbl+" "+fmtDur(by[k])+"</span>" : "";
  let wp=0, wt=0;
  for(const [k] of DAYS) for(const t of state.days[k].tasks){ if(t.cat==="poker") wp+=t.dur; if(t.cat==="theory") wt+=t.dur; }
  summaryEl.innerHTML =
    '<div class="s-line"><span class="s-range">'+curDay().start+" вЖТ "+endLabel+"</span>"+
      part("poker","–°–µ—Б—Б–Є—П")+part("theory","–Ґ–µ–Њ—А–Є—П")+part("training","–°–њ–Њ—А—В")+
      part("projects","–Я—А–Њ–µ–Ї—В—Л")+part("english","–Р–љ–≥–ї.")+part("free","–°–≤–Њ–±–Њ–і–љ–Њ вЙИ")+
    "</div>"+
    '<div class="s-week">–Э–µ–і–µ–ї—П: –Я–Њ–Ї–µ—А '+fmtDur(wp)+" ¬Ј –Ґ–µ–Њ—А–Є—П "+fmtDur(wt)+"</div>";
}
function positionNowLine(){
  if(currentDay!==TODAY_KEY){ nowLine.style.display="none"; return; }
  const now=new Date(); const nm=now.getHours()*60+now.getMinutes();
  const off=nm-curStartMin(); const total=Math.max(layoutCurrent().total, winMin());
  if(off<0||off>total){ nowLine.style.display="none"; return; }
  nowLine.style.display="block"; nowLine.style.top=off+"px";
}
function switchDay(k){ currentDay=k; closeEditor(); dayStartInput.value=curDay().start; renderTabs(); renderTimeline(); }
function renderAll(){ applyTheme(); renderTabs(); dayStartInput.value=curDay().start; dayEndInput.value=(state.settings.dayEnd)||"22:00"; renderTimeline(); }

/* ===================== DRAG (Pointer Events) =====================
   –Э–∞ —В–µ–ї–µ—Д–Њ–љ–µ: —В–∞—Й–Є—В—М –Ј–∞ ¬Ђ—А—Г—З–Ї—Г¬ї (в†њ) вАФ –Њ–љ–∞ —Б touch-action:none, –њ–Њ—Н—В–Њ–Љ—Г
   —Б—В—А–∞–љ–Є—Ж–∞ –љ–µ —Б–Ї—А–Њ–ї–ї–Є—В—Б—П –≤–Њ –≤—А–µ–Љ—П –і—А–∞–≥–∞; —В–µ–ї–Њ –±–ї–Њ–Ї–∞ —Б–Ї—А–Њ–ї–ї–Є—В —Б–њ–Є—Б–Њ–Ї (pan-y)
   –Є –Њ—В–Ї—А—Л–≤–∞–µ—В —А–µ–і–∞–Ї—В–Њ—А –њ–Њ —В–∞–њ—Г. –Э–∞ –Љ—Л—И–Є –Љ–Њ–ґ–љ–Њ —В–∞—Й–Є—В—М –Ј–∞ –ї—О–±—Г—О —З–∞—Б—В—М –±–ї–Њ–Ї–∞. */
let press=null, resizing=null;

function onPointerDown(e, task, el){
  if(e.target.closest(".resize-handle")){ startResize(e, task, el); return; }
  if(press||resizing) return;
  const onGrip = !!e.target.closest(".grip");
  const eligible = onGrip || e.pointerType==="mouse";
  press={ task, block:el, pointerId:e.pointerId, startX:e.clientX, startY:e.clientY,
          moved:false, dragging:false, eligible, candidate:curTasks() };
  if(eligible){ try{ el.setPointerCapture(e.pointerId); }catch(_){ } }
  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp);
  window.addEventListener("pointercancel", onPointerCancel);
}
function onPointerMove(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(!press.moved && Math.hypot(e.clientX-press.startX, e.clientY-press.startY)>6) press.moved=true;
  if(press.dragging){ e.preventDefault(); dragMoveTo(e.clientY); return; }
  if(press.eligible && press.moved) startDrag(e);
}
function onPointerUp(e){
  if(!press || e.pointerId!==press.pointerId) return;
  const wasTap = !press.dragging && !press.moved;
  const tapId = press.task.id;
  if(press.dragging) commitDrag();
  cleanupPress();
  if(wasTap) openEditor(tapId);
}
function onPointerCancel(e){
  if(!press || e.pointerId!==press.pointerId) return;
  if(press.dragging){
    stopAutoScroll();
    press.block.classList.remove("dragging");
    document.body.classList.remove("dragging-active");
    renderTimeline(); // –Њ—В–Ї–∞—В –Ї —Б–Њ—Е—А–∞–љ—С–љ–љ–Њ–Љ—Г –њ–Њ—А—П–і–Ї—Г
  }
  cleanupPress();
}
function cleanupPress(){
  window.removeEventListener("pointermove", onPointerMove);
  window.removeEventListener("pointerup", onPointerUp);
  window.removeEventListener("pointercancel", onPointerCancel);
  if(press){ try{ press.block.releasePointerCapture(press.pointerId); }catch(_){ } }
  press=null;
}
function startDrag(e){
  press.dragging=true;
  try{ press.block.setPointerCapture(e.pointerId); }catch(_){ }
  const lay=layoutCurrent();
  press.total=lay.total;
  press.h=press.task.dur;
  press.others=curTasks().filter(t=>t.id!==press.task.id);
  press.map={}; timelineEl.querySelectorAll(".block").forEach(b=>press.map[b.dataset.id]=b);
  press.grabOffset = e.clientY - press.block.getBoundingClientRect().top;
  press.block.classList.add("dragging");
  document.body.classList.add("dragging-active");
  startAutoScroll();
  dragMoveTo(e.clientY);
}
function dragMoveTo(clientY){
  press.lastY=clientY;
  const trect=timelineEl.getBoundingClientRect();
  const top=clamp((clientY-trect.top)-press.grabOffset, 0, Math.max(0, press.total-press.h));
  press.block.style.top=top+"px";
  const center=top+press.h/2;
  const startMin=curStartMin();
  // —В–Њ—З–Ї–∞ –≤—Б—В–∞–≤–Ї–Є = —З–Є—Б–ї–Њ ¬Ђ—З—Г–ґ–Є—Е¬ї –±–ї–Њ–Ї–Њ–≤, —З—М–Є —Ж–µ–љ—В—А—Л –≤—Л—И–µ —Ж–µ–љ—В—А–∞ –њ–µ—А–µ—В–∞—Б–Ї–Є–≤–∞–µ–Љ–Њ–≥–Њ
  const lo=computeLayout(press.others, startMin).items;
  let k=0; for(const it of lo){ if(it.top+it.height/2 < center) k++; else break; }
  const candidate=press.others.slice(0,k).concat([press.task], press.others.slice(k));
  press.candidate=candidate;
  // —А–∞–Ј–і–≤–Є–≥–∞–µ–Љ —Б–Њ—Б–µ–і–µ–є: –њ–µ—А–µ—Б—З—С—В —А–∞—Б–Ї–ї–∞–і–Ї–Є –Ї–∞–љ–і–Є–і–∞—В–∞, –≤—Б–µ –Њ—Б—В–∞–ї—М–љ—Л–µ –µ–і—Г—В –љ–∞ —Б–≤–Њ–Є –Љ–µ—Б—В–∞
  const cl=computeLayout(candidate, startMin).items;
  for(const it of cl){
    if(it.task.id===press.task.id){ press.block.querySelector(".b-time").textContent=fmtTime(it.startMin); continue; }
    const el=press.map[it.task.id]; if(!el) continue;
    el.style.top=it.top+"px";
    el.querySelector(".b-time").textContent=fmtTime(it.startMin);
  }
}
function commitDrag(){
  stopAutoScroll();
  curDay().tasks=press.candidate;
  press.block.classList.remove("dragging");
  document.body.classList.remove("dragging-active");
  saveSoon();
  renderTimeline();
}
/* –∞–≤—В–Њ-—Б–Ї—А–Њ–ї–ї —Г –Ї—А–∞—С–≤ */
function startAutoScroll(){ if(!press.raf) press.raf=requestAnimationFrame(autoTick); }
function stopAutoScroll(){ if(press&&press.raf){ cancelAnimationFrame(press.raf); press.raf=null; } }
function autoTick(){
  if(!press||!press.dragging){ return; }
  const r=scrollEl.getBoundingClientRect(), y=press.lastY, EDGE=56; let v=0;
  if(y<r.top+EDGE) v=-Math.ceil((r.top+EDGE-y)/4);
  else if(y>r.bottom-EDGE) v=Math.ceil((y-(r.bottom-EDGE))/4);
  if(v){ const b=scrollEl.scrollTop; scrollEl.scrollTop+=v; if(scrollEl.scrollTop!==b) dragMoveTo(press.lastY); }
  press.raf=requestAnimationFrame(autoTick);
}

/* ===================== –†–Х–°–Р–Щ–Ч (–љ–Є–ґ–љ–Є–є –Ї—А–∞–є) ===================== */
function startResize(e, task, el){
  if(press||resizing) return;
  e.preventDefault();
  resizing={ task, el, pointerId:e.pointerId };
  try{ el.setPointerCapture(e.pointerId); }catch(_){ }
  timelineEl.classList.add("resizing");
  document.body.classList.add("dragging-active");
  window.addEventListener("pointermove", onResizeMove);
  window.addEventListener("pointerup", onResizeUp);
  window.addEventListener("pointercancel", onResizeUp);
}
function onResizeMove(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  e.preventDefault();
  const top=resizing.el.getBoundingClientRect().top;
  const dur=clamp(roundTo5(e.clientY-top), 10, 24*60);
  if(dur===resizing.task.dur) return;
  resizing.task.dur=dur;
  const lay=layoutCurrent();
  timelineEl.style.height=Math.max(lay.total, winMin(), 120)+"px";
  for(const it of lay.items){
    const b=timelineEl.querySelector('.block[data-id="'+it.task.id+'"]');
    if(!b) continue;
    b.style.top=it.top+"px"; b.style.height=visH(it.height)+"px";
    b.querySelector(".b-time").textContent=fmtTime(it.startMin);
    if(it.task.id===resizing.task.id) b.querySelector(".b-dur").textContent=fmtDur(it.task.dur);
  }
  renderSummary();
}
function onResizeUp(e){
  if(!resizing || e.pointerId!==resizing.pointerId) return;
  timelineEl.classList.remove("resizing");
  document.body.classList.remove("dragging-active");
  window.removeEventListener("pointermove", onResizeMove);
  window.removeEventListener("pointerup", onResizeUp);
  window.removeEventListener("pointercancel", onResizeUp);
  try{ resizing.el.releasePointerCapture(resizing.pointerId); }catch(_){ }
  resizing=null;
  saveSoon();
  renderTimeline();
}

/* ===================== –†–Х–Ф–Р–Ъ–Ґ–Ю–† ===================== */
const editingTask = () => curTasks().find(t=>t.id===editingId);
function computedStart(task){ const it=layoutCurrent().items.find(i=>i.task.id===task.id); return it?it.startMin:curStartMin(); }
function buildChips(task){
  edChips.innerHTML="";
  for(const k in CATS){
    const c=document.createElement("button");
    c.className="chip"+(k===task.cat?" on":"");
    c.style.setProperty("--cat", CATS[k].color);
    c.textContent=CATS[k].label;
    c.onclick=()=>{ const t=editingTask(); if(!t) return; t.cat=k; buildChips(t); renderTimeline(); saveSoon(); };
    edChips.appendChild(c);
  }
}
function openEditor(id){
  const task=curTasks().find(t=>t.id===id); if(!task) return;
  editingId=id;
  edName.value=task.name;
  buildChips(task);
  edDur.textContent=fmtDur(task.dur);
  edFixed.checked = task.fixedStart!=null;
  edFixedWrap.hidden = task.fixedStart==null;
  edFixedTime.value = fmtTime(task.fixedStart!=null ? task.fixedStart : computedStart(task));
  editorOverlay.hidden=false;
}
function closeEditor(){ editorOverlay.hidden=true; editingId=null; }

edName.addEventListener("input", ()=>{ const t=editingTask(); if(!t) return; t.name=edName.value; renderTimeline(); saveSoon(); });
document.querySelector(".stepper").addEventListener("click", e=>{
  const b=e.target.closest("button[data-d]"); if(!b) return;
  const t=editingTask(); if(!t) return;
  t.dur=clamp(t.dur+(+b.dataset.d), 10, 24*60);
  edDur.textContent=fmtDur(t.dur); renderTimeline(); saveSoon();
});
edFixed.addEventListener("change", ()=>{
  const t=editingTask(); if(!t) return;
  if(edFixed.checked){ t.fixedStart=roundTo5(computedStart(t)); edFixedTime.value=fmtTime(t.fixedStart); }
  else t.fixedStart=null;
  edFixedWrap.hidden=!edFixed.checked;
  renderTimeline(); saveSoon();
});
edFixedTime.addEventListener("input", ()=>{
  const t=editingTask(); if(!t||t.fixedStart==null) return;
  t.fixedStart=parseTime(edFixedTime.value); renderTimeline(); saveSoon();
});
$("edDelete").addEventListener("click", ()=>{
  const i=curTasks().findIndex(t=>t.id===editingId);
  if(i>=0) curTasks().splice(i,1);
  closeEditor(); renderTimeline(); saveSoon();
});
$("edDone").addEventListener("click", closeEditor);
$("edClose").addEventListener("click", closeEditor);
editorOverlay.addEventListener("click", e=>{ if(e.target===editorOverlay) closeEditor(); });

/* ===================== –Я–Р–Э–Х–Ы–ђ –Ш–Э–°–Ґ–†–£–Ь–Х–Э–Ґ–Ю–Т ===================== */
$("addBtn").addEventListener("click", ()=>{
  const t={ id:uid(), name:"–Э–Њ–≤–∞—П –Ј–∞–і–∞—З–∞", cat:"free", dur:60, fixedStart:null };
  curTasks().push(t); renderTimeline(); saveSoon();
  scrollEl.scrollTop=scrollEl.scrollHeight;
  openEditor(t.id);
});
dayStartInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayStartInput.value)){ curDay().start=dayStartInput.value; renderTimeline(); saveSoon(); }
});
dayEndInput.addEventListener("change", ()=>{
  if(/^\d{1,2}:\d{2}$/.test(dayEndInput.value)){ state.settings.dayEnd=dayEndInput.value; renderTimeline(); saveSoon(); }
});

/* undo / redo: –Ї–љ–Њ–њ–Ї–Є + –Ї–ї–∞–≤–Є–∞—В—Г—А–∞ */
$("undoBtn").addEventListener("click", ()=>History.undo());
$("redoBtn").addEventListener("click", ()=>History.redo());
window.addEventListener("keydown", (e)=>{
  if(!(e.ctrlKey||e.metaKey)) return;
  const tag=(e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;   // –љ–µ –Љ–µ—И–∞–µ–Љ –љ–∞—В–Є–≤–љ–Њ–Љ—Г undo –≤ –њ–Њ–ї—П—Е
  if(press||resizing) return;                    // –љ–µ –і—С—А–≥–∞—В—М –≤–Њ –≤—А–µ–Љ—П –і—А–∞–≥–∞/—А–µ—Б–∞–є–Ј–∞
  const k=e.key.toLowerCase();
  if(k==="z" && !e.shiftKey){ e.preventDefault(); History.undo(); }
  else if(k==="y" || (k==="z" && e.shiftKey)){ e.preventDefault(); History.redo(); }
});
$("resetBtn").addEventListener("click", ()=>{
  if(!confirm("–°–±—А–Њ—Б–Є—В—М –≤—Б–µ –і–љ–Є –Ї —Б—В–∞—А—В–Њ–≤–Њ–Љ—Г —И–∞–±–ї–Њ–љ—Г?")) return;
  state=template(); Storage.save(state);
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  renderAll(); Cloud.pushSoon(); History.record(); toast("–°–±—А–Њ—И–µ–љ–Њ –Ї —И–∞–±–ї–Њ–љ—Г");
});
themeBtn.addEventListener("click", ()=>{
  state.settings.theme = state.settings.theme==="dark" ? "light" : "dark";
  applyTheme(); saveSoon();
});
function applyTheme(){
  const dark=state.settings.theme==="dark";
  document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  themeBtn.textContent = dark ? "вШАпЄП" : "рЯМЩ";
}

/* —Н–Ї—Б–њ–Њ—А—В: —Б–Ї–∞—З–∞—В—М JSON + —Б–Ї–Њ–њ–Є—А–Њ–≤–∞—В—М –≤ –±—Г—Д–µ—А */
$("exportBtn").addEventListener("click", ()=>{
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="planner-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(json).then(()=>toast("–°–Ї–∞—З–∞–љ–Њ –Є —Б–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ"),()=>toast("–§–∞–є–ї —Б–Ї–∞—З–∞–љ"));
  else toast("–§–∞–є–ї —Б–Ї–∞—З–∞–љ");
});
/* –Є–Љ–њ–Њ—А—В */
$("importBtn").addEventListener("click", ()=>{ imText.value=""; imErr.textContent=""; importOverlay.hidden=false; });
$("imClose").addEventListener("click", ()=>importOverlay.hidden=true);
importOverlay.addEventListener("click", e=>{ if(e.target===importOverlay) importOverlay.hidden=true; });
$("imLoad").addEventListener("click", ()=>{
  try{
    const norm=validateState(JSON.parse(imText.value));
    state=norm; Storage.save(state);
    if(!state.days[currentDay]) currentDay="mon";
    importOverlay.hidden=true; renderAll(); Cloud.pushSoon(); History.record(); toast("–Ш–Љ–њ–Њ—А—В–Є—А–Њ–≤–∞–љ–Њ");
  }catch(err){ imErr.textContent="–Ю—И–Є–±–Ї–∞: "+(err.message||err); }
});
/* –Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Є–µ –і–љ—П */
$("copyBtn").addEventListener("click", ()=>{
  copyDays.innerHTML="";
  for(const [k,l] of DAYS){
    if(k===currentDay) continue;
    const b=document.createElement("button");
    b.textContent=l+(k===TODAY_KEY?" вАҐ":"");
    b.onclick=()=>{
      state.days[k].tasks=curTasks().map(t=>({...t,id:uid()}));
      state.days[k].start=curDay().start;
      Storage.save(state); Cloud.pushSoon(); History.record(); copyOverlay.hidden=true; toast("–°–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ –≤ ¬Ђ"+l+"¬ї");
      if(k===currentDay) renderTimeline();
    };
    copyDays.appendChild(b);
  }
  copyOverlay.hidden=false;
});
$("cpClose").addEventListener("click", ()=>copyOverlay.hidden=true);
copyOverlay.addEventListener("click", e=>{ if(e.target===copyOverlay) copyOverlay.hidden=true; });

/* —В–Њ—Б—В */
let _toastTimer=null;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show");
  if(_toastTimer) clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1800); }

/* ===================== –°–Ґ–Р–†–Ґ ===================== */
function init(){
  const loaded=Storage.load();
  if(loaded){ try{ state=validateState(loaded); }catch(e){ state=template(); } }
  else state=template();
  currentDay = state.days[TODAY_KEY] ? TODAY_KEY : "mon";
  applyTheme();
  renderTabs();
  dayStartInput.value=curDay().start;
  dayEndInput.value=(state.settings.dayEnd)||"22:00";
  renderTimeline();
  History.init();                      // –±–∞–Ј–Њ–≤—Л–є —Б–љ–Є–Љ–Њ–Ї –і–ї—П undo/redo
  setInterval(positionNowLine, 30000); // –ї–Є–љ–Є—П ¬Ђ—Б–µ–є—З–∞—Б¬ї вАФ —А–∞–Ј –≤ 30—Б
  Cloud.init();                        // –њ–Њ–і–Ї–ї—О—З–∞–µ–Љ –Њ–±–ї–∞–Ї–Њ –њ–Њ–≤–µ—А—Е –ї–Њ–Ї–∞–ї—М–љ–Њ–≥–Њ —А–µ–ґ–Є–Љ–∞
}
init();
